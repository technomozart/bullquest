var DOC = {"nav": [{"group": "Welcome", "items": [{"slug": "README", "title": "About BullQuest"}, {"slug": "getting-started", "title": "Getting Started"}, {"slug": "wallets", "title": "Wallets & Sign-in"}]}, {"group": "Your Bulls", "items": [{"slug": "bulls", "title": "Bulls & the Genesis Collection"}, {"slug": "stats-rarity", "title": "Stats, Rarity & Rank"}, {"slug": "leveling", "title": "Leveling & Progression"}, {"slug": "breeding-fusion-gear", "title": "Breeding, Fusion & Gear"}]}, {"group": "Playing", "items": [{"slug": "arena", "title": "The Arena (Duels)"}, {"slug": "energy", "title": "Energy"}, {"slug": "ranked-duels", "title": "Ranked Duels & Seasons"}, {"slug": "daily-quests", "title": "Daily Quests"}, {"slug": "daily-spin", "title": "Daily Spin"}, {"slug": "training", "title": "Training"}]}, {"group": "Meta Game", "items": [{"slug": "sector-wars", "title": "Sector Wars"}, {"slug": "clans", "title": "Clans"}, {"slug": "account-rank", "title": "Account Rank"}]}, {"group": "Economy", "items": [{"slug": "currencies", "title": "Currencies: GRIT, HAY, $BULL"}, {"slug": "tokenomics", "title": "$BULL Tokenomics"}, {"slug": "marketplace", "title": "Marketplace"}]}, {"group": "More", "items": [{"slug": "fairness", "title": "Fairness & Anti-Cheat"}, {"slug": "roadmap", "title": "Roadmap"}, {"slug": "faq", "title": "FAQ"}]}, {"group": "Legal", "items": [{"slug": "terms", "title": "Terms of Use"}, {"slug": "privacy", "title": "Privacy Policy"}]}], "pages": {"README": {"title": "About BullQuest", "md": "# About BullQuest\n\nBullQuest is a free-to-play, skill-first bull game. You claim your own Genesis bull, train it up\nthrough quests and duels, and charge into the Arena to climb the ranks. It is web-first, plays in\nyour browser, and every match is decided by how well you play, never by how much you spend.\n\nIf you have played a move-to-earn game like Walken, the shape will feel familiar: a collectible\ncreature with stats and rarity, an arena where you battle, daily rewards, and a layered currency\nsystem. BullQuest takes those ideas and fixes the parts that broke them, most importantly the\neconomy (see [Currencies](currencies.md) and [$BULL Tokenomics](tokenomics.md)).\n\n## The three pillars\n\n* **Bull Ownership.** Each bull is uniquely yours, with its own rarity, stats, and history, tied\n  to your account from day one. See [Bulls & the Genesis Collection](bulls.md).\n* **Ranked Duels.** Head-to-head battles decided by timing and stance, not by your wallet. Climb a\n  seasonal ladder on pure skill. See [The Arena](arena.md).\n* **Sector Wars.** Join a clan and fight for control of crypto-market sectors over a weekly cycle.\n  See [Sector Wars](sector-wars.md).\n\n## What makes BullQuest different\n\n* **No pay-to-win.** Rarity and spending raise your *ceiling* and let you play *more*, never your\n  per-duel win chance. Matchmaking pits you against bulls of similar power, so the better-played\n  bull wins, not the better-funded one.\n* **Every action pays something.** Even a lost duel returns some GRIT. A spin always ticks your\n  progress. Loss should never feel like wasted time.\n* **A sustainable economy.** The currency you win comes from other players' entry fees\n  (redistribution), not from an inflation faucet. That is the single biggest reason Walken's token\n  collapsed, and the thing we engineered around from day one.\n\n## What is live today\n\nBullQuest is being built in the open. Live right now: create an account (email or Solana wallet),\nclaim your free Genesis bull, real Arena duels, energy, a real GRIT balance, and the daily spin.\nFeatures marked **Coming** in these docs (the $BULL token, HAY, breeding, the marketplace, full\nSector Wars) are on the [Roadmap](roadmap.md) and ship in phases. Where a page describes a planned\nfeature, it says so.\n\n> Brand and numbers are provisional and will be tuned during testing.\n"}, "getting-started": {"title": "Getting Started", "md": "# Getting Started\n\nGetting into BullQuest takes under a minute, and you walk away with a free Genesis bull.\n\n## 1. Open the game\n\nGo to the BullQuest web app in any modern browser (desktop or mobile). There is nothing to\ndownload.\n\n## 2. Create your account\n\nOn the welcome screen you have two ways in:\n\n* **Sign in with Solana** (recommended if you have a wallet): connect Phantom, Solflare, or\n  Backpack and sign a one-time message. No password to remember. See [Wallets & Sign-in](wallets.md).\n* **Continue with email**: sign up with an email and a password. No crypto needed at all.\n\nEither way, your account is created instantly.\n\n## 3. Claim your free bull\n\nThe moment your account is created, BullQuest hands you one **free Genesis bull**, drawn at random\nfrom the 5,000-bull collection. You will see a reveal card with its name, rarity, and rank. That\nbull is yours, tied to your account, with its own stats and history.\n\n> One free bull per account. Owning more bulls later lets you play more and specialize, but never\n> gives you a per-duel win advantage (see [Stats, Rarity & Rank](stats-rarity.md)).\n\n## 4. Your first duel\n\nHead to the **Arena** from the bottom navigation:\n\n1. Pick a **Discipline** (Clash, Chase, or Standoff). This chooses which of your bull's stats\n   decides the fight.\n2. Pick a **Stance** (Charge, Feint, or Brace). This is the skill layer, a soft rock-paper-scissors\n   read against your opponent.\n3. Hit **Charge!** to duel.\n\nYou win or lose based on your stats, your stance read, a small dose of luck, and your bull's hidden\nTemper (crit) stat. Win and you earn GRIT and XP. Even a loss returns some GRIT. Each duel spends a\nlittle Energy, which refills over time. Full details in [The Arena](arena.md).\n\n## 5. Come back daily\n\n* Take your free **Daily Spin** for 10 to 100 GRIT.\n* Clear your **Daily Quests**.\n* Keep your **login streak** alive for escalating rewards.\n\nThat is the loop: claim, train, charge, climb.\n"}, "wallets": {"title": "Wallets & Sign-in", "md": "# Wallets & Sign-in\n\nBullQuest runs on **Solana mainnet**. You do not need a wallet to play, but connecting one is the\nsmoothest way to sign in and is required later for anything on-chain.\n\n## Two ways to sign in\n\n### Sign in with Solana\n\nSupported wallets:\n\n* **Phantom**\n* **Solflare**\n* **Backpack**\n\nWhen you click a wallet, it opens and asks you to **sign a message** (not a transaction, so it\ncosts nothing and moves no funds). BullQuest verifies that signature on the server and logs you in.\nThe same wallet always returns to the same account, so your bull and progress are always there.\n\n> BullQuest never asks for your seed phrase or private key, and signing in never sends a\n> transaction or spends SOL. If anything ever asks for your seed phrase, it is not us.\n\n### Continue with email\n\nPrefer no crypto? Sign up with an email and password. You get the exact same game and the same free\nbull. You can think about a wallet later.\n\n## Do I need SOL?\n\nNot to play. Signing in with a wallet is free (it is a signature, not a transaction). You will only\nneed SOL or $BULL once on-chain features ship (minting your bull, high-stakes entries, the\nmarketplace). Those are on the [Roadmap](roadmap.md).\n\n## Are my bulls on-chain?\n\n**Not yet.** Today your bull lives in your BullQuest account. On-chain ownership (minting your bull\nas a real Solana asset) is a planned phase. When it ships, you will be able to mint the bull you\nalready own. Until then, \"your bull\" means it is tied to your account and yours to keep and train.\n\n## Switching or losing access\n\n* **Wallet sign-in:** your account is your wallet. Keep your wallet safe and you keep your account.\n* **Email sign-in:** use the same email and password. A password reset flow is on the way.\n"}, "bulls": {"title": "Bulls & the Genesis Collection", "md": "# Bulls & the Genesis Collection\n\nBulls are the heart of BullQuest. Every player owns at least one, and each is a unique character\nwith its own look, stats, rarity, and record.\n\n## The Genesis Collection\n\nThe founding collection is **5,000 Genesis bulls**, hand-designed and generated as a layered art\nset. Every bull is a unique combination of traits, so no two are alike. Every new account is given\none Genesis bull for free, drawn at random from the pool. Once a bull is claimed it is off the\ntable, so the collection is finite.\n\n## What a bull is made of\n\nEach bull is built from four visible art layers plus a set of game stats:\n\n* **Body** (hide color): the base color of the bull.\n* **Belly**: the belly patch color.\n* **Horns**: shape and material, from plain nubs to legendary lava, gold, galaxy, and more.\n* **Face**: the expression and muzzle.\n\nColors are coordinated on purpose. A bull's body, belly, and horns share a color temperature (warm\nor cool), with neutral tones that pair with anything, so every bull looks intentional rather than\nrandom.\n\nUnder the hood, a bull also has combat stats (Power, Speed, Stamina, and hidden Temper), a level,\nenergy, and a win/loss record. See [Stats, Rarity & Rank](stats-rarity.md).\n\n## Genesis perks\n\nGenesis bulls are the founding premium collection. They carry permanent, **bounded** perks:\nprestige cosmetics (think golden horns and auras on the rarest ones), a small GRIT-gain bonus,\npriority access to events, and a modest breeding-luck edge when breeding ships.\n\nCrucially, Genesis bulls have **no per-duel win-rate perk**. Their advantages are prestige,\nthroughput, and flavor, never a thumb on the scale in a fight. That is a deliberate fix for the\nkind of permanent inequality that hurt other games.\n\n## Owning more than one\n\nYou start with one. Later you will be able to own more bulls (through the marketplace, breeding, or\nfuture drops). More bulls means:\n\n* More total **Energy** across your stable, so more duels per day.\n* The ability to **specialize**, for example a Clash bull, a Chase bull, and a Standoff bull.\n* More **Sector Wars** deployments.\n\nMore bulls scale your *breadth of participation*, with deliberately diminishing returns, never your\nraw power. See [Currencies](currencies.md) for why the economy is built this way.\n"}, "stats-rarity": {"title": "Stats, Rarity & Rank", "md": "# Stats, Rarity & Rank\n\n## The four stats\n\nEvery bull has four stats. Three are visible and drive combat; one is hidden and creates build\nvariety.\n\n| Stat | What it does | Where it matters |\n|---|---|---|\n| **Power** | Raw charge force | Primary stat in the **Clash** discipline |\n| **Speed** | Agility and initiative | Primary stat in the **Chase** discipline |\n| **Stamina** | Endurance and grit | Primary stat in the **Standoff** discipline |\n| **Temper** *(hidden)* | Wildness | Drives your chance and size of a critical \"Rampage\" hit |\n\nYour starter bull begins with modest, slightly varied stats so no two bulls play identically. Stats\ngrow as you [level up](leveling.md), toward a ceiling set by rarity.\n\n## Rarity\n\nRarity sets a bull's **stat ceiling** (how strong it can eventually become), its **energy pool**\n(how much it can play per day), and its **prestige**. Rarity does **not** grant a flat win-chance\nbonus. This is the single most important fairness rule in BullQuest.\n\nThe design ceiling and energy scale roughly like this (illustrative, tuned during testing):\n\n| Rarity | Stat ceiling | Energy pool | Drop weight |\n|---|---|---|---|\n| Common | lower | small | most common |\n| Uncommon | ^ | ^ | |\n| Rare | ^ | medium | |\n| Epic | ^ | large | |\n| Legendary | high | larger | rare |\n| Mythic | highest | largest | rarest |\n\nA maxed Common still competes fairly inside its matchmaking bracket. Higher rarity is aspiration,\nthroughput, and status, not an auto-win.\n\n## Rank\n\nEvery Genesis bull also has a **collection rank** from 1 to 5,000, where **1 is the rarest**. Rank\ncomes from how unusual a bull's specific trait combination is. When you claim a bull you see its\nrank (\"Rank #864 of 5,000\"). Collectors care about rank; the game treats all bulls fairly\nregardless.\n\nIn the app, a bull's overall tier badge (Common, Rare, Epic, Legendary) is derived from its rank:\nthe lower the rank number, the higher the tier.\n\n## Stats are earned, never bought\n\nYour stats come from **playing**: winning duels, leveling up, and (soon) training. They are held on\nthe server and cannot be edited from your browser. Nobody can pay to bump their Power, and nobody\ncan hack their stats client-side. This keeps the ladder honest.\n"}, "leveling": {"title": "Leveling & Progression", "md": "# Leveling & Progression\n\nYour bull grows stronger as you play. Leveling raises its stats toward its rarity ceiling, so a bull\nyou invest in becomes a real contender.\n\n## How you level\n\n* Winning and fighting duels earns **XP**.\n* When your XP bar fills, your bull **levels up**, and its Power, Speed, and Stamina each rise a\n  little.\n* Levels run from 1 upward, with each level needing more than the last, so late levels are a real\n  goal to chase.\n\n## The GRIT curve (design)\n\nIn the full design, leveling is paced by a rising **GRIT** cost curve: you fill each level bar with\nGRIT earned from play. Early levels are cheap; later ones cost a lot more. This makes GRIT a\nmeaningful sink and makes a single free bull take a while to max, which is exactly the intended\npace. Today, XP from duels drives leveling directly; the GRIT-paced curve arrives as progression\ndeepens.\n\n## Milestone gates (coming)\n\nEvery few levels there is a **milestone gate** that costs a hard resource:\n\n* **Before the token:** the gate costs **HAY** (bought with SOL or card).\n* **After the token launches:** the gate adds a small **$BULL** burn.\n\nThis keeps the game fully playable before the token exists, then switches on a clean token sink\nlater without changing how the game feels.\n\n## Ceilings, not power creep\n\nA bull can only level toward the ceiling set by its **rarity**. That keeps the game fair: leveling\nis meaningful, but it cannot push any bull past the fair bounds of its bracket. See\n[Stats, Rarity & Rank](stats-rarity.md).\n\n## Owning more bulls\n\nProgression is per bull. Owning more bulls lets you level several in parallel and specialize each\nfor a discipline, which is breadth, not a shortcut to raw power.\n"}, "breeding-fusion-gear": {"title": "Breeding, Fusion & Gear", "md": "# Breeding, Fusion & Gear\n\n> **Status: Coming.** These systems are designed as the main supply and sink levers of the economy.\n\n## Breeding\n\nPair two eligible bulls to produce an **offspring** with mixed genetics. Breeding:\n\n* Burns GRIT (and $BULL once the token is live), a sink.\n* Is level-gated, so low-level breeding can produce a downgrade while high-level breeding can upgrade,\n  which puts a sink behind leveling.\n* Has **breed-count caps by rarity**, which limits how much new supply can enter.\n\n## Fusion\n\nSacrifice several bulls to create **one higher-rarity** bull (chance-based). Fusion:\n\n* **Burns the input bulls**, a real supply sink that keeps the collection from bloating.\n* Has a small chance at a special cosmetic trait (a capped, time-decaying flex), which creates\n  recurring demand.\n\n## Gear & cosmetics\n\nEquip horns, rings, brands, armor, and boots.\n\n* **Stat gear** provides **bounded sidegrades** within your bracket. It lets you specialize a bull\n  for a discipline; it does not raise your raw win rate.\n* **Cosmetics** are pure status. They make your bull look the part and are a clean sink.\n* A **re-equip cooldown** stops one gear set from serving many bulls, which keeps gear demand real.\n\nEvery one of these is designed as a **sink** first: they take currency and supply out of the\neconomy, which is what keeps the token healthy. See [Currencies](currencies.md).\n"}, "arena": {"title": "The Arena (Duels)", "md": "# The Arena (Duels)\n\nThe Arena is where BullQuest is won and lost. A duel is a fast, one-on-one battle decided by three\nthings you control (your bull's stats, your discipline, and your stance) plus a small, provably\nbounded dose of luck. There is no pure stat-math auto-win, and there is no way to buy the result.\n\n## The flow of a duel\n\n1. You are matched against an opponent bull of **similar power** (matchmaking brackets keep fights\n   fair).\n2. You choose a **Discipline** and a **Stance**, and set your **stake**.\n3. You hit **Charge!**.\n4. The server resolves the duel, shows you the result, and pays out.\n\nEvery part of the result is calculated on the server, so it cannot be tampered with.\n\n## Disciplines (the stat matchup)\n\nYour Discipline decides which stat carries the fight. Each discipline weights the three visible\nstats differently:\n\n| Discipline | Primary (60%) | Second (25%) | Third (15%) |\n|---|---|---|---|\n| **Clash** (head-on) | Power | Stamina | Speed |\n| **Chase** (pursuit) | Speed | Power | Stamina |\n| **Standoff** (endurance) | Stamina | Speed | Power |\n\nPick the discipline that plays to your bull's strengths. A high-Power bull wants Clash; a fast bull\nwants Chase.\n\n## Stances (the skill layer)\n\nBefore the duel you secretly pick a **Stance**. Stances beat each other in a soft\nrock-paper-scissors:\n\n```\nCHARGE  beats  FEINT  beats  BRACE  beats  CHARGE\n(reckless)     (trickery)    (dig in)\n```\n\n* Win the stance read and you get a **multiplier boost** to your score.\n* Mirror (same stance) is neutral.\n* Lose the read and you take a small penalty.\n\nThis is where skill lives. Reading your opponent and picking the right stance lets a smart free\nplayer out-think a stronger bull. Winning the read does **not** guarantee the win, it tips the odds.\n\n## How a duel is scored\n\nEach side's score is calculated as:\n\n```\nScore = WeightedStats  x  StanceMultiplier  x  CritRoll  x  RNG\n```\n\n* **WeightedStats**: your stats weighted by the chosen discipline.\n* **StanceMultiplier**: your stance read result (boost, neutral, or penalty).\n* **CritRoll**: a chance for a critical \"Rampage\" hit, driven by your hidden **Temper** stat. When\n  it lands it adds a bonus to your score.\n* **RNG**: a small, bounded random factor, seeded so the result is verifiable (see\n  [Fairness & Anti-Cheat](fairness.md)).\n\nThe higher score wins. Because the RNG is bounded and the opponent is bracket-matched, within your\nbracket the better-played bull wins more often than the better-funded one.\n\n## Rewards\n\n* **Win**: you earn GRIT (your stake back plus your opponent's, minus a small house rake) and a\n  chunk of XP.\n* **Loss**: you still get some GRIT back and a little XP. A duel is never a total loss.\n\nWinning also levels your bull over time and moves you up the [Ranked Duels](ranked-duels.md) ladder.\n\n## Cost\n\nEach duel spends **Energy**, which refills over time. See [Energy](energy.md). Higher-stakes and\ntournament entries will use HAY once it ships (see [Currencies](currencies.md)).\n\n## Bear Raids (coming)\n\nAlongside player-versus-player duels, **Bear Raids** are co-op or solo battles against Bear-Market\nbosses. They are good for new and solo players and drop GRIT, crafting materials, and cosmetics.\nPlanned for a later phase.\n"}, "energy": {"title": "Energy", "md": "# Energy\n\nEnergy is how many duels your bull can fight before it needs to rest. It is the natural pace-setter\nof the game and the reason to come back through the day.\n\n## How it works\n\n* Each bull has an **Energy pool** (currently up to 10).\n* A duel costs **2 Energy**.\n* Energy **regenerates over time**, currently 1 point roughly every 15 minutes, up to your pool\n  cap. (Numbers are tuned during testing.)\n\nSo a full bull can fight several duels in a row, then tops back up on its own while you are away.\nUnspent regeneration is a gentle nudge to return.\n\n## Energy and rarity\n\nHigher-rarity bulls have **larger energy pools** and regenerate a little faster. This is part of\nwhat rarity buys: not a stronger punch, but **more plays per day** (throughput). See\n[Stats, Rarity & Rank](stats-rarity.md).\n\n## Refills (coming)\n\nWhen HAY ships you will be able to buy an instant **Energy refill** with it, for players who want to\nkeep going. HAY is a consumable that is burned on use, so refills are a genuine sink, not free\ncurrency. See [Currencies](currencies.md).\n\n## Multiple bulls, more energy\n\nBecause energy is per bull, owning more bulls means more total energy across your stable, and more\nduels per day. This is the main way owning more bulls scales your play, always breadth, never raw\npower.\n"}, "ranked-duels": {"title": "Ranked Duels & Seasons", "md": "# Ranked Duels & Seasons\n\nRanked Duels are the competitive spine of BullQuest: a seasonal ladder you climb on skill.\n\n## Seasons\n\n* A season runs about 6 to 8 weeks.\n* At the end there is a **soft rank reset**, so there is fresh urgency each season without wiping\n  your progress entirely.\n\n## Tiers\n\nYou climb through named tiers, each with sub-divisions (illustrative):\n\n```\nCalf  \u2192  Bullock  \u2192  Raging  \u2192  Stampede  \u2192  Bull Market  \u2192  Legendary\n```\n\nYou gain or lose rank points per duel, with promotions and relegations between tiers.\n\n## Rewards\n\nLadder rewards come from two honest sources:\n\n* **Duel entry-fee pools** (redistributive): the GRIT and, later, HAY staked into duels is paid\n  back out to winners.\n* **Seasonal chests** at tier thresholds (sink-backed, arriving with the token phase).\n\nTop tiers also earn **cosmetics and titles**, pure status rewards.\n\n## Matchmaking keeps it fair\n\nYou are always matched inside a **Bull Rating bracket** and your ladder tier, so opponents are close\nto you in power. Stance play and bounded variance decide the fight. You cannot buy your way into\nstomping weaker players; spending just lets you play more and climb into higher brackets where\neveryone is strong. See [The Arena](arena.md) and [Fairness & Anti-Cheat](fairness.md).\n\n> Today duels, rewards, and records are live. The full seasonal ladder with tiers and promotions\n> rolls out as the competitive layer matures. See the [Roadmap](roadmap.md).\n"}, "daily-quests": {"title": "Daily Quests", "md": "# Daily Quests\n\nDaily Quests are small goals that reset each day and reward you for playing the way the game is meant\nto be played.\n\n## How they work\n\n* You get a small set of quests each day, for example \"Win 3 duels\", \"Spin the wheel\", or\n  \"Enter the Arena\".\n* Complete a quest to earn a reward (GRIT and progress).\n* Clear all of the day's quests to earn a **bonus chest**.\n* Streak jars unlock at 3, 5, and 7 days of completions. Days do not need to be consecutive for the\n  jars, so missing a day is not the end of the world.\n\n## Why they exist\n\nQuests give structure to a session and make sure every kind of play pays off. They are one part of\nthe daily loop, alongside the [Daily Spin](daily-spin.md) and your login streak.\n\n> Quest rewards are GRIT and progress today. As the economy deepens, some quests will pay HAY or\n> feed seasonal goals. See the [Roadmap](roadmap.md).\n"}, "daily-spin": {"title": "Daily Spin", "md": "# Daily Spin\n\nThe Daily Spin is your free once-a-day pull on the prize wheel. It is the easiest GRIT you will earn\nand a good reason to check in every day.\n\n## How it works\n\n* Every account gets **one free spin per day**.\n* The wheel has 12 segments, all **GRIT** rewards, from small to a rare **100 GRIT jackpot**.\n* The result is decided on the server, then the wheel lands on it, so what you see is what you get.\n* The reward is credited to your GRIT balance immediately.\n* After you spin, the card shows \"Come back tomorrow\" until your next free spin unlocks.\n\n## Odds\n\nSmaller GRIT prizes are common; the 100 GRIT jackpot is deliberately rare. You are guaranteed to win\nGRIT on every spin, there are no empty slots.\n\n## Extra spins (coming)\n\nWhen HAY ships you will be able to buy **extra spins** with it beyond your free daily one. Because\nHAY is burned on use, extra spins are a real sink rather than free currency. Higher [Account\nRank](account-rank.md) will also raise your spin reward tier.\n"}, "training": {"title": "Training", "md": "# Training\n\n> **Status: Coming.** Training is designed and on the roadmap. This page describes how it will work.\n\nTraining is the idle-return hook of BullQuest. It replaces the \"walking\" of move-to-earn games with\nsomething a web-first game can deliver: start a session on a bull, come back later, and collect.\n\n## How it will work\n\n* Each bull can occupy a **Training Slot**.\n* You start a session and choose a length:\n\n| Session | Duration | Reward |\n|---|---|---|\n| Light | 2 hours | small GRIT + XP |\n| Standard | 4 hours | medium GRIT + XP |\n| Deep | 8 hours | large GRIT + XP (great overnight) |\n\n* When the session finishes, you collect your GRIT and XP, then start another.\n* Sessions bank while you are offline up to a cap, so returning the next day always has a payoff.\n\n## Multiple bulls\n\nOwning more bulls means more **Training Slots** running in parallel, so more GRIT per day. Slots\nbeyond a soft cap will cost HAY to keep active, which keeps the economy balanced.\n\n## Instant finish (coming)\n\nAn optional **instant finish** with HAY lets impatient players collect early. Like other HAY uses,\nit is a sink.\n"}, "sector-wars": {"title": "Sector Wars", "md": "# Sector Wars\n\n> **Status: Coming.** Sector Wars is designed as the social endgame and the flagship of the\n> economy. This page describes how it will work.\n\nSector Wars is a map of territories themed on **crypto market sectors**: DeFi, Memes, L1s, Gaming,\nAI, RWA, NFTs, Privacy, and more. Clans fight to control sectors over a weekly cycle. Controlling a\nsector pays pooled rewards and prestige, and it is contested constantly, so holding it is a fight.\n\n## The weekly cycle\n\n1. **Declare.** Clans stake into the sectors they want to attack or defend. The stake is their entry\n   into the sector's redistributive prize pool.\n2. **Contest.** During the window, clan members fight **Sector Duels**. Their combined results make\n   up the clan's Sector Score.\n3. **Resolve.** The clan with the highest Sector Score controls the sector for the next cycle.\n4. **Reward.** The staked pool (minus a rake that is partly burned as a sink) is paid out to the\n   winning clan. Controllers also earn a passive sector yield and exclusive cosmetics and titles.\n\n## Fair by design\n\n* **Caps:** a single clan can hold only so many sectors, and there are per-member and per-clan stake\n  caps.\n* **Diminishing yield** for over-concentration, so one whale clan cannot own the whole map.\n* **Redistributive:** rewards come from staked pools, never from printing new tokens. The rake is a\n  permanent sink.\n\n\"Control DeFi this season\" is the kind of flex the audience gets instantly, and it is the beating\nheart of the redistributive economy. See [Clans](clans.md) and [Currencies](currencies.md).\n"}, "clans": {"title": "Clans", "md": "# Clans\n\n> **Status: Coming** (ships with Sector Wars).\n\nClans are BullQuest's guilds. They are **native and automated from day one**, so there are no manual\nsign-up forms or waiting on an admin to add you. You join, you contribute, you share the rewards.\n\n## What clans have\n\n* **Roles** (leader, officers, members) and a clan **treasury**.\n* Clan **chat** and a member roster.\n* A shared goal each week: win **Sector Duels** to raise the clan's Sector Score in\n  [Sector Wars](sector-wars.md).\n\n## How you contribute\n\nMembers contribute by winning Sector Duels during the weekly cycle. Your wins feed the clan's score,\nand when the clan wins a sector, the staked pool is shared with the herd.\n\n## Joining and leaving\n\nAdding and removing members is handled in-game, quickly, without external forms. You can find a\nclan, apply or join, and start contributing the same session.\n"}, "account-rank": {"title": "Account Rank", "md": "# Account Rank\n\n> **Status: Coming.**\n\nAccount Rank is a separate, account-level rank (0 to 10) that reflects how active and invested you\nare. It is different from your [Ranked Duels](ranked-duels.md) ladder tier.\n\n## What it gates\n\nYour Account Rank raises:\n\n* Your **Daily Spin** reward tier.\n* Your daily **chest** size.\n* Marketplace **sell slots**.\n* Eligibility for **Sector captaincy**.\n\n## How it is calculated\n\nAccount Rank is based on a rolling window of:\n\n* Recent activity (duels and training over the last week or so).\n* Owned assets (bulls and other NFTs).\n* Season performance.\n* Quest completion.\n\n## It decays, but fairly\n\nIf you go inactive, your Account Rank slowly decays, which nudges you to return. Here is the\nimportant part: Account Rank is **not** tied to holding the token. Many games punished you for\nselling by decaying your rank when your token balance dropped. BullQuest rewards **engagement and\nownership**, never \"hold the speculative token or lose your rank.\"\n"}, "currencies": {"title": "Currencies: GRIT, HAY, $BULL", "md": "# Currencies: GRIT, HAY, $BULL\n\nBullQuest uses three currencies, deliberately separated so each does one job well. This separation\nis the core fix for the economy problems that sank move-to-earn tokens.\n\n## The one principle\n\n> The tradeable token's demand must not come from expecting to earn more of the token.\n\nThe game currency you grind (GRIT) is soft and off-chain, so grinding it can never become token sell\npressure. The tradeable token ($BULL) is scarce, and you mostly **win it from other players' entry\nfees**, not from an inflation faucet. That single choice is why the economy is built to last.\n\n## GRIT (soft currency)\n\n* **What:** an off-chain, in-game currency. Never tradable, never cashable.\n* **Earn it from:** duels, the daily spin, quests, and (soon) training.\n* **Spend it on:** leveling your bull, low-tier crafting, cosmetic customization, and re-rolls.\n* **Why soft:** GRIT absorbs the infinite free grind. Because it never leaves the game, it can never\n  turn into token sell pressure.\n\n**GRIT is live today.** You start with a small balance and grow it by playing.\n\n## HAY (premium consumable) - *coming*\n\n* **What:** a consumable \"gas\" bought with $BULL, SOL, or a card.\n* **Spend it on:** energy refills, arena and tournament entry fees, temporary boosts, extra spins,\n  and crafting attempts.\n* **Why:** HAY is **burned on use**, which creates a steady, low-friction sink. It is the main way\n  real spend flows through the game, and it keeps the token economy balanced.\n\n## $BULL (the token) - *coming, Solana mainnet*\n\n* **What:** a Solana SPL token, hard-capped supply. The only liquid financial asset in the game.\n* **Demand comes from (non-reflexive):** utility (minting, breeding, high-stakes entries, premium\n  cosmetics, gear), status (holding tiers, exclusive events, governance), and **buyback-burn from\n  real revenue** (real cash flow buys and burns $BULL).\n* **How you get it:** mainly by **winning redistributive prize pools** (other players' entry fees),\n  or by buying it. Direct emission from a rewards bucket is minimized, capped, and throttled.\n\nSee [$BULL Tokenomics](tokenomics.md) for the supply and vesting.\n\n## Why three layers\n\n| Layer | Currency | Tradable | Job |\n|---|---|---|---|\n| Soft | **GRIT** | No | absorb the grind, pace leveling |\n| Consumable | **HAY** | Bought, burned | the monetization sink |\n| Hard | **$BULL** | Yes (on-chain) | scarce utility, status, governance |\n\nThe grind faucet is a soft, non-tradable currency. The tradeable token stays scarce and\ndemand-driven. That is the whole design.\n"}, "tokenomics": {"title": "$BULL Tokenomics", "md": "# $BULL Tokenomics\n\n> **Status: Coming.** The token launches only after the game proves retention. Everything here is a\n> proposed starting point and the full schedule is **published at or before launch**.\n\n## Headline\n\n* **Token:** $BULL, an SPL token on **Solana mainnet**.\n* **Total supply:** **1,000,000,000 (1 billion), hard-capped.**\n* **Emission philosophy:** capped, throttled, and circuit-broken, never a per-user faucet.\n* **Disclosure:** the full vesting schedule is published at or before launch. Radical transparency\n  is the point.\n\n## Allocation\n\n| Bucket | % | Purpose | Vesting |\n|---|---|---|---|\n| **Play & Ecosystem Rewards** | 30% | Redistributive prize top-ups, capped seasonal emission, staking-for-access | 48-month capped release, circuit-broken |\n| **Community & Airdrops** | 8% | Player airdrops, Genesis-holder allocation, quests | Engagement-gated over 24 months |\n| **Treasury & LiveOps** | 17% | Ops, content, buyback-burn, partnerships, liquidity support | 6% at launch, then 36-month linear |\n| **Team & Advisors** | 15% | Founders and contributors | 12-month cliff, then 36-month linear |\n| **Investors** | 18% | Fundraise | 6 to 12-month cliff, then 24 to 36-month linear |\n| **Liquidity** | 12% | Deep launch liquidity | 100% at launch (locked) |\n\n## What this fixes\n\nThe token was designed by studying exactly how other move-to-earn tokens collapsed, and fixing each\ntrap:\n\n* **Deeper liquidity:** 12% at launch (three times deeper than the game we studied), so unlocks\n  cannot collapse the order book on their own.\n* **A tamer reward stream:** 30% over 48 months, capped and circuit-broken, so emission cannot\n  outrun the game's sinks, and it auto-throttles in a downturn.\n* **Smaller insider overhang** with **published long cliffs**, so there are no surprise unlocks.\n* **Real-revenue demand:** the treasury uses real revenue to **buy back and burn** $BULL, which is\n  demand that does not depend on anyone expecting to earn more token.\n\n## Launch unlock is small\n\nOnly about 15 to 17% of supply is circulating at launch (mostly the locked liquidity plus a small\ncommunity and treasury slice). Team and investors sit behind cliffs.\n\n> These numbers are a starting point and depend on the fundraise. The final, exact schedule is\n> published before the token exists.\n"}, "marketplace": {"title": "Marketplace", "md": "# Marketplace\n\n> **Status: Coming.**\n\nThe Marketplace is where you will buy, sell, and trade bulls and gear with other players.\n\n## Getting another bull\n\nToday every account gets one free Genesis bull. Later, you will be able to get more bulls by:\n\n* **Buying** one on the marketplace from another player.\n* **Breeding** two of your bulls (see [Breeding, Fusion & Gear](breeding-fusion-gear.md)).\n* **Fusing** several bulls into a rarer one.\n* **Events and drops.**\n\n## Trading\n\n* Listings will be priced in $BULL (and settle on Solana), with fees partly burned as a sink.\n* Your number of **sell slots** is gated by your [Account Rank](account-rank.md), which discourages\n  spam and market manipulation.\n* Re-equip cooldowns on gear prevent one set of items from serving an entire stable, which keeps\n  gear demand healthy.\n\n## Fairness\n\nThe marketplace is rate-limited and monitored for manipulation. Because there is no free-action to\ntoken faucet, there is nothing profitable to farm by botting; a bot just meets equally strong\nopponents in matchmaking.\n\nPrices, fees, and slot rules are set closer to launch. Until then, the marketplace is on the\n[Roadmap](roadmap.md).\n"}, "fairness": {"title": "Fairness & Anti-Cheat", "md": "# Fairness & Anti-Cheat\n\nBullQuest is built so that skill decides duels and nobody can cheat the outcome or their stats.\n\n## Server-authoritative outcomes\n\nEvery duel is resolved **on the server**, inside a database function. Your browser sends your\nchoices (discipline, stance, stake); it does not send the result. This means:\n\n* You cannot edit your stats from the browser. Power, Speed, Stamina, level, XP, and your record are\n  all server-side and locked, so there is no way to hack a stronger bull.\n* You cannot forge a win. The math runs where you cannot touch it.\n\n## Provably fair randomness\n\nThe bounded random factor in a duel is **seeded**. The server derives the roll from a seed it can\nreveal, so a result can be recomputed and checked. The design goal is full commit-reveal fairness:\nthe server publishes a hashed seed before the duel, combines it with a client seed, and reveals the\nserver seed after, so anyone can verify the result was not rigged. This is a deliberate contrast to\nopaque server math.\n\n## Matchmaking is the fairness engine\n\nYou are always matched against a bull of **similar power** (a Bull Rating bracket). You cannot buy\nyour way into stomping weaker players. Spending only lets you play more and climb into higher\nbrackets, where everyone is strong. Inside your bracket, stance play and bounded variance decide the\nfight.\n\n## Anti-bot by design\n\n* Rate limits and anomaly detection on duels and the marketplace.\n* Because there is **no free-action to token faucet**, there is nothing profitable to bot for. A bot\n  just meets equally strong opponents in matchmaking and earns soft currency that never leaves the\n  game.\n* Wallet sign-ins are gated by a real cryptographic signature.\n\n## Your account safety\n\nBullQuest never asks for your seed phrase or private key. Signing in with a wallet is a message\nsignature, not a transaction: it costs nothing and moves no funds. If anything ever asks for your\nseed phrase, it is not us.\n"}, "roadmap": {"title": "Roadmap", "md": "# Roadmap\n\nBullQuest ships in phases, on purpose. The game comes first, ownership and the token come later,\nonce the game has proven people want to play it. That order is a deliberate choice, not an accident.\n\n## Phase 1: Play the game (live)\n\n* Create an account (email or Solana wallet) and claim your free Genesis bull.\n* Real Arena duels: disciplines, stances, crit, bounded RNG, server-authoritative.\n* Energy and a real GRIT balance.\n* Daily Spin for real GRIT.\n* Your bull shown across the app with its real art, stats, rarity, and record.\n\n## Phase 2: Depth and retention (next)\n\n* Training sessions (the idle-return loop).\n* Real Daily Quests, streaks, and the seasonal ladder with tiers.\n* More of the home dashboard driven by your real progress.\n* CAPTCHA and account hardening ahead of a public launch.\n\n## Phase 3: On-chain ownership\n\n* **Mint your bull** as a real asset on Solana mainnet.\n* The Marketplace opens: buy, sell, and trade bulls and gear.\n* Breeding and Fusion.\n\n## Phase 4: Sector Wars and clans\n\n* Clans go live.\n* Sector Wars: weekly territory battles over crypto-market sectors, with redistributive prize pools.\n\n## Phase 5: The $BULL token\n\n* Launch $BULL on Solana mainnet, with the full vesting schedule published up front.\n* HAY becomes the premium sink; milestone gates and high-stakes entries switch on the token sink.\n* Staking and governance.\n\n> Everything above on-chain is future-tense on purpose. Today your bull lives in your account and\n> the game is free to play. We will not present a feature as done until it is.\n"}, "faq": {"title": "FAQ", "md": "# FAQ\n\n### Is BullQuest free?\n\nYes. You create an account and get a free Genesis bull, and the whole game loop (duels, spin,\nquests) is free to play. You never have to spend to compete.\n\n### Do I need a crypto wallet?\n\nNo. You can sign up with just an email. Connecting a Solana wallet (Phantom, Solflare, Backpack) is\nan optional, smoother way to sign in, and it will be needed later for on-chain features. See\n[Wallets & Sign-in](wallets.md).\n\n### Do I need SOL to play?\n\nNo. Signing in with a wallet is a free message signature, not a transaction. You would only need SOL\nor $BULL once on-chain features (minting, the marketplace, high-stakes entries) ship.\n\n### Is my bull an NFT on-chain?\n\nNot yet. Today your bull is tied to your BullQuest account. Minting it as a real Solana asset is a\nplanned phase; when it ships you will be able to mint the bull you already own. See the\n[Roadmap](roadmap.md).\n\n### Can I earn real money right now?\n\nNo, and that is by design. Today you earn GRIT, a soft in-game currency that is not tradable or\ncashable. The tradeable $BULL token comes only after the game proves retention, and even then the\ngame is built so you earn by winning other players' entry fees, not from an inflation faucet.\n\n### How many bulls can I have?\n\nYou start with one. Later you can own more through the marketplace, breeding, and drops. Owning more\nbulls lets you play more and specialize, with diminishing returns, and never gives a per-duel win\nadvantage.\n\n### Does spending money let me win more?\n\nNo. Rarity and spending raise your ceiling and let you play more, but matchmaking pits you against\nbulls of similar power, so the better-played bull wins. There is no pay-to-win. See\n[Fairness & Anti-Cheat](fairness.md).\n\n### Why did my duel lose when I won the stance read?\n\nWinning the stance read tips the odds in your favor; it does not guarantee a win. Stats, your\nopponent's stats, the crit rolls, and bounded luck all factor in. That variance is what makes the\nArena a game of reads rather than pure math. See [The Arena](arena.md).\n\n### How does energy work?\n\nEach duel costs energy, and energy refills over time. Higher-rarity bulls have bigger energy pools.\nSee [Energy](energy.md).\n\n### My bull shows a placeholder image, not real art. Why?\n\nThe 5,000-bull art set is being uploaded in batches. If your bull shows a placeholder, its image is\nstill on its way and will appear shortly.\n\n### How do I get support?\n\nSupport channels are set up alongside the public launch. Until then, reach the team through the\nofficial BullQuest links.\n\n> Brand, numbers, and exact rules in these docs are provisional and tuned during testing.\n"}, "terms": {"title": "Terms of Use", "md": "# Terms of Use\n\n_Last updated: July 2026. BullQuest is in active development (beta); these terms are a starting point and will be updated before public launch._\n\nWelcome to BullQuest (\"BullQuest\", \"we\", \"us\"). By creating an account or playing, you agree to these Terms of Use. If you do not agree, please do not use BullQuest.\n\n## 1. Who can play\n\nYou must be at least 13 years old (or the minimum digital-consent age where you live) and able to form a binding agreement. Do not use BullQuest where it is prohibited by law.\n\n## 2. Your account\n\n- You are responsible for keeping your login (email and password, or your Solana wallet) secure.\n- One account per person. Do not create multiple accounts to farm rewards.\n- We never ask for your wallet seed phrase or private keys, and we never take custody of your funds. Signing in with a wallet is a message signature, not a transaction.\n\n## 3. The game and GRIT\n\nBullQuest is a free-to-play game. **GRIT is a soft, in-game currency with no monetary value.** It is not money, is not redeemable for cash, and cannot be sold, traded, or transferred off the platform. Your bull, stats, GRIT, and other in-game items are a limited license to use inside the game, not property or a financial instrument, and we may adjust them as part of running and balancing the game.\n\n## 4. Forward-looking features and the $BULL token\n\nParts of BullQuest describe planned features, including the **$BULL token and any airdrop**. These are **forward-looking and are not a promise or guarantee.** They may change, be delayed, or never launch. Nothing in BullQuest is an offer or solicitation to buy any token or security, is financial or investment advice, or is a guarantee of any future value, reward, or airdrop. Do not play expecting financial gain. Any future token or airdrop, if it happens, will have its own separate terms.\n\n## 5. Fair play\n\nDo not cheat, exploit bugs, use bots or automation, reverse-engineer ur account, provide the game, save your progress, prevent cheating and abuse, respond to feedback and support, and improve BullQuest. We do **not** sell your personal data.\n\n## Who processes it\n\nBullQuest runs on third-party infrastructure that processes data on our behalf, including **Supabase** (database, authentication, and file storage), **Cloudflare** (bot and abuse protection), and **GitHub Pages** (web hosting). Each has its own security and privacy practices.\n\n## Local storage\n\nWe store small amounts of data in your browser, such as your login session and preferences like your login streak and whether you have seen the intro guide. You can clear this from your browser at any time.\n\n## Wallet and blockchain\n\nA Solana wallet address is public on the blockchain by nature. We use it only to identify your account. We never receive or store your seed phrase or private keys, and signing in never moves funds.\n\n## Keeping and deleting data\n\nWe keep your data while your account is active. You can request access to or deletion of your data through the in-app Feedback button or the official BullQuest channels. Deleting your account releases your bull back into the collection.\n\n## Children\n\nBullQuest is not directed at children under 13 (or the minimum age where you live). We do not knowingly collect their data.\n\n## Changes\n\nWe may update this policy as the game evolves; material changes will be shown here with a new date.\n\n## Contact\n\nReach us through the in-app **Feedback** button or the official BullQuest channels.\n"}}, "first": "README"};
var flat = [];
DOC.nav.forEach(function(g){ g.items.forEach(function(i){ flat.push(i); }); });

function buildSide(filter){
  var s = document.getElementById('side'), html = '<input class="search" id="q" placeholder="Search docs..." value="'+(filter||'')+'">';
  DOC.nav.forEach(function(g){
    var items = g.items.filter(function(i){ return !filter || i.title.toLowerCase().indexOf(filter.toLowerCase())>=0; });
    if(!items.length) return;
    html += '<div class="grp">'+g.group+'</div>';
    items.forEach(function(i){ html += '<a href="#'+i.slug+'" data-slug="'+i.slug+'">'+i.title+'</a>'; });
  });
  s.innerHTML = html;
  var q = document.getElementById('q');
  q.addEventListener('input', function(){ buildSide(q.value); setTimeout(function(){ document.getElementById('q').focus(); },0); });
  markActive();
}
function markActive(){
  var slug = (location.hash||'#'+DOC.first).slice(1);
  [].forEach.call(document.querySelectorAll('.side a'), function(a){ a.classList.toggle('on', a.getAttribute('data-slug')===slug); });
}
function render(){
  var slug = (location.hash||'#'+DOC.first).slice(1);
  var pg = DOC.pages[slug] || DOC.pages[DOC.first];
  var c = document.getElementById('content');
  c.innerHTML = marked.parse(pg.md);
  // rewrite internal .md links to hash routes
  [].forEach.call(c.querySelectorAll('a[href$=".md"]'), function(a){ a.setAttribute('href', '#'+a.getAttribute('href').replace('.md','')); });
  document.title = pg.title + ' - BullQuest Docs';
  // pager
  var idx = flat.findIndex(function(i){ return i.slug===slug; });
  var pv = idx>0?flat[idx-1]:null, nx = idx>=0&&idx<flat.length-1?flat[idx+1]:null, ph='';
  if(pv) ph += '<a href="#'+pv.slug+'"><small>Previous</small>'+pv.title+'</a>'; else ph+='<span></span>';
  if(nx) ph += '<a class="next" href="#'+nx.slug+'"><small>Next</small>'+nx.title+'</a>';
  document.getElementById('pager').innerHTML = ph;
  markActive();
  document.body.classList.remove('nav-open');
  window.scrollTo(0,0);
}
