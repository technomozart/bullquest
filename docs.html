<script>
var DOC = {"nav":[{"group":"Welcome","items":[{"slug":"README","title":"📖  About BullQuest"},{"slug":"getting-started","title":"🚀  Getting Started"},{"slug":"wallets","title":"🔑  Wallets & Sign-in"}]},{"group":"Your Bulls","items":[{"slug":"bulls","title":"🐂  Bulls & the Genesis Collection"},{"slug":"stats-rarity","title":"📊  Stats, Rarity & Rank"},{"slug":"leveling","title":"📈  Leveling & Progression"},{"slug":"breeding-fusion-gear","title":"🧬  Breeding, Fusion & Gear"}]},{"group":"Playing","items":[{"slug":"arena","title":"⚔️  The Arena (Duels)"},{"slug":"energy","title":"⚡  Energy"},{"slug":"ranked-duels","title":"🏆  Ranked Duels & Seasons"},{"slug":"daily-quests","title":"✅  Daily Quests"},{"slug":"daily-spin","title":"🎡  Daily Spin"},{"slug":"training","title":"🏋️  Training"}]},{"group":"Meta Game","items":[{"slug":"sector-wars","title":"🗺️  Sector Wars"},{"slug":"clans","title":"🛡️  Clans"},{"slug":"account-rank","title":"⭐  Account Rank"}]},{"group":"Economy","items":[{"slug":"airdrop","title":"🪂  $BULL Airdrop"},{"slug":"currencies","title":"💰  Currencies: GRIT, HAY, $BULL"},{"slug":"tokenomics","title":"🪙  $BULL Tokenomics"},{"slug":"marketplace","title":"🛒  Marketplace"}]},{"group":"More","items":[{"slug":"fairness","title":"⚖️  Fairness & Anti-Cheat"},{"slug":"roadmap","title":"🧭  Roadmap"},{"slug":"faq","title":"❓  FAQ"}]},{"group":"Legal","items":[{"slug":"terms","title":"📜  Terms of Use"},{"slug":"privacy","title":"🔒  Privacy Policy"}]}],"pages":{"README":{"title":"About BullQuest","md":"# About BullQuest\n\nBullQuest is a free-to-play, skill-and-stats bull game. You claim your own Genesis bull, train it up\nthrough quests and duels, and charge into the Arena to gather GRIT and climb the board. It is web-first,\nplays in your browser, and every match is resolved on our server, so nobody can hack the outcome.\n\nIf you have played a creature-collector or move-to-earn game, the shape will feel familiar: a collectible\nbull with stats and rarity, an arena where you battle, daily rewards, and a layered currency system.\nBullQuest takes those ideas and fixes the parts that broke them, most importantly the economy (see\n[Currencies](currencies.md) and [$BULL Tokenomics](tokenomics.md)).\n\n## The three pillars\n\n* **Bull Ownership.** Each bull is uniquely yours, with its own rarity, stats, and history, tied to your\n  account from day one. See [Bulls & the Genesis Collection](bulls.md).\n* **Arena Duels.** Fast head-to-head battles decided by your bull's stats, your discipline and stance\n  choices, your bull's rarity and level, and a bounded dose of luck. See [The Arena](arena.md).\n* **Sector Wars** *(live).* Back one of eight crypto-market sectors with your bull and duel wins over a 3-day\n  cycle. See [Sector Wars](sector-wars.md).\n\n## What makes BullQuest different\n\n* **No pay-to-win.** Your first bull is free and its rarity is random, so nobody buys their way to a\n  stronger bull today. Rarity gives a modest, bounded edge (see [Stats, Rarity & Rank](stats-rarity.md)),\n  never a runaway advantage, and you can never edit or buy raw stats.\n* **Real stakes.** A duel puts GRIT on the line: win and you take your stake, lose and you forfeit about 60% of it. Your daily spin always adds GRIT. Loss should\n  never feel like wasted time.\n* **An economy built to last.** GRIT, the currency you grind, is soft and off-chain, so it can never become\n  token sell pressure. The tradeable **$BULL** token (coming) is designed to draw its value from real\n  demand and redistribution, not an endless faucet, which is the trap that sank similar games. See\n  [Currencies](currencies.md).\n\n## What is live today\n\nBullQuest is being built in the open. Live right now: create an account with Google, email, Telegram, or a Solana wallet, claim your\nfree Genesis bull, real Arena duels against challenger bulls, energy, a real GRIT balance, the daily spin,\ndaily quests, the Gym, Sector Wars, the Marketplace, social quests, referrals, login streaks, and a GRIT leaderboard. Features marked **Coming** in these docs (the $BULL token, HAY,\nbreeding, seasonal ranked ladders, on-chain minting) are on the\n[Roadmap](roadmap.md) and ship in phases. Where a page describes a planned feature, it says so.\n\n> Brand and numbers are provisional and will be tuned during testing."},"getting-started":{"title":"Getting Started","md":"# Getting Started\n\nGetting into BullQuest takes under a minute, and you walk away with a free Genesis bull.\n\n## 1. Open the game\n\nGo to the BullQuest web app in any modern browser (desktop or mobile). There is nothing to download.\n\n## 2. Create your account\n\nOn the welcome screen the fastest ways in are free and need no crypto:\n\n* **Continue with Google** (one tap, if you have a Google account).\n* **Continue with Telegram** (one tap from the Telegram app or our bot).\n* **Continue with email** (an email and a password).\n* **Or connect a Solana wallet** (Phantom, Solflare, or Backpack) if you already use one. Optional. See\n  [Wallets & Sign-in](wallets.md).\n\nEither way, your account is created instantly, with no wallet or crypto required.\n\n## 3. Claim your free bull\n\nThe moment your account is created, BullQuest hands you one **free Genesis bull**, drawn at random from the\n5,000-bull collection. You will see a reveal card with its name, rarity, and rank. That bull is yours, tied\nto your account, with its own stats and history. Show it off from the reveal to earn bonus GRIT with a\nfriend.\n\n> One free bull per account. Owning more bulls later lets you play more and specialize (see\n> [Stats, Rarity & Rank](stats-rarity.md)).\n\n## 4. Your first duel\n\nHead to the **Arena** from the bottom navigation:\n\n1. Pick a **Discipline** (Clash, Chase, or Standoff). This chooses which of your bull's stats decides the\n   fight.\n2. Pick a **Stance** (Charge, Feint, or Brace). You commit it blind against the challenger's hidden stance,\n   so it is a gamble that swings the fight.\n3. Hit **Fight!** to duel (the go button is Fight, not the Charge stance).\n\nYou win or lose based on your stats, your stance gamble, your bull's rarity and level, your hidden Temper\n(crit) stat, and a small dose of luck. Every duel stakes 20 GRIT. Win and you gain your stake plus XP. A loss forfeits about 60% of it (a 20 GRIT stake costs about 12) and still earns a little XP. Each\nduel spends a little Energy, which refills over time. Full details in [The Arena](arena.md).\n\n## 5. Keep earning\n\n* Take your free **Daily Spin** for 10 to 100 GRIT and clear your **Daily Quests**.\n* Train stats in the **Gym**, and back a sector in **Sector Wars**.\n* Join our **Discord and Telegram** and **invite friends** for bonus GRIT (in the Quests page).\n\nEvery bit of GRIT you gather grows your **$BULL airdrop** share (see the [Airdrop](airdrop.md)). That is the\nloop: claim, train, charge, climb."},"wallets":{"title":"Wallets & Sign-in","md":"# Wallets & Sign-in\n\nBullQuest runs on **Solana mainnet**, but **you do not need a wallet to play**. Google, email, or Telegram sign-in\ngives you the exact same game and the same free bull.\n\n## Four ways to sign in\n\n### Continue with Google\n\nOne tap with your Google account. Nothing to install, no password to invent. This is the quickest way in.\n\n### Continue with email\n\nSign up with an email and a password. No crypto at all.\n\n### Continue with Telegram\n\nOne tap from the Telegram app or our bot (@BullQuestSol_bot). No password, and it lands on the same account as the web.\n\n### Connect a Solana wallet (optional)\n\nSupported wallets: **Phantom**, **Solflare**, **Backpack**. Clicking a wallet asks you to **sign a message**\n(not a transaction, so it costs nothing and moves no funds), and BullQuest verifies that signature and logs\nyou in. A wallet is optional for playing, but it is what you use to **buy and sell bulls in the Marketplace**\nand to **register your $BULL airdrop payout wallet**.\n\n> BullQuest never asks for your seed phrase or private key, and signing in never sends a transaction or\n> spends SOL. If anything ever asks for your seed phrase, it is not us.\n\n## Do I need SOL?\n\nNot to play, and not to earn GRIT or your airdrop share. You only need SOL for on-chain actions: **buying or\nselling bulls in the Marketplace**, and optional paid extras (an extra spin or an energy refill). Signing in\nwith a wallet is always free.\n\n## Wallets and payments on Telegram and the app\n\nTelegram does not allow crypto payments inside its app, and the in-app browser has no wallet, so **connecting a wallet and paying with SOL do not work inside Telegram**. The same applies to the phone app.\n\nWhat still works everywhere, including Telegram and the app:\n\n* Playing, dueling, quests, the daily spin, and earning GRIT.\n* **Setting your $BULL airdrop payout wallet** by pasting your Solana address (it is receive-only, so no signing and no payment is needed).\n\nTo connect a wallet, buy or sell a bull, or buy a paid extra, **open BullQuest in your phone browser (Chrome or Safari) or on desktop at bullquest.fun**. It is the same account, so your bulls, GRIT, and progress come with you. When you try one of these actions inside Telegram, BullQuest shows a one-tap \"Open in browser\" prompt.\n\n## Are my bulls on-chain?\n\n**Not yet.** Today your bull lives in your BullQuest account, and buying and selling bulls is website-first\n(ownership tracked in your account, settled in SOL). Minting your bull as a real on-chain Solana asset is a\nplanned later phase; when it ships you will be able to mint the bull you already own.\n\n## Switching or losing access\n\n* **Google or wallet sign-in:** the same Google account or wallet always returns to the same account.\n* **Telegram sign-in:** opening the Mini App or the bot again returns you to the same account.\n* **Email sign-in:** use the same email and password. A password reset flow is on the way.\n"},"bulls":{"title":"Bulls & the Genesis Collection","md":"# Bulls & the Genesis Collection\n\nBulls are the heart of BullQuest. Every player owns at least one, and each is a unique character\nwith its own look, stats, rarity, and record.\n\n## The Genesis Collection\n\nThe founding collection is **5,000 Genesis bulls**, hand-designed and generated as a layered art\nset. Every bull is a unique combination of traits, so no two are alike. Every new account is given\none Genesis bull for free, drawn at random from the pool. Once a bull is claimed it is off the\ntable, so the collection is finite.\n\n## What a bull is made of\n\nEach bull is built from four visible art layers plus a set of game stats:\n\n* **Body** (hide color): the base color of the bull.\n* **Belly**: the belly patch color.\n* **Horns**: shape and material, from plain nubs to legendary lava, gold, galaxy, and more.\n* **Face**: the expression and muzzle.\n\nColors are coordinated on purpose. A bull's body, belly, and horns share a color temperature (warm\nor cool), with neutral tones that pair with anything, so every bull looks intentional rather than\nrandom.\n\nUnder the hood, a bull also has combat stats (Power, Speed, Stamina, and hidden Temper), a level,\nenergy, and a win/loss record. See [Stats, Rarity & Rank](stats-rarity.md).\n\n## Genesis perks\n\nGenesis bulls are the founding premium collection. They carry permanent, **bounded** perks:\nprestige cosmetics (think golden horns and auras on the rarest ones), a small GRIT-gain bonus,\npriority access to events, and a modest breeding-luck edge when breeding ships.\n\nIn a fight, a Genesis bull's only edge comes from its **rarity and level**, a small, bounded tilt to its win chance that the Arena shows you before every duel (see [Stats, Rarity & Rank](stats-rarity.md)). There is no separate hidden Genesis multiplier stacked on top, and you can never buy or edit raw stats, so no bull is ever an auto-win.\n\n## Owning more than one\n\nYou start with one. You can already buy more bulls in the live Marketplace, and later through breeding and future drops. More bulls means:\n\n* More total **Energy** across your stable, so more duels per day.\n* The ability to **specialize**, for example a Clash bull, a Chase bull, and a Standoff bull.\n* More **Sector Wars** deployments.\n\nMore bulls scale your *breadth of participation*, with deliberately diminishing returns, never your\nraw power. See [Currencies](currencies.md) for why the economy is built this way.\n"},"stats-rarity":{"title":"Stats, Rarity & Rank","md":"# Stats, Rarity & Rank\n\n## The four stats\n\nEvery bull has four stats. Three are visible and drive combat; one is hidden and creates build variety.\n\n| Stat | What it does | Where it matters |\n|---|---|---|\n| **Power** | Raw charge force | Primary stat in the **Clash** discipline |\n| **Speed** | Agility and initiative | Primary stat in the **Chase** discipline |\n| **Stamina** | Endurance and grit | Primary stat in the **Standoff** discipline |\n| **Temper** *(hidden)* | Wildness | Drives the chance and size of a critical \"Rampage\" hit |\n\nYour starter bull begins with modest, slightly varied stats so no two bulls play identically. Winning duels\nearns XP, and every level-up raises Power, Speed, and Stamina.\n\n## Rarity\n\nRarity does three things: it sets a bull's **starting stats and energy pool**, it gives a **small, bounded\nedge to its win chance**, and it carries **prestige**. Higher rarity is an advantage, but a measured one, not\nan auto-win, and because your first bull is free and random, nobody buys a better win rate today.\n\nThe four live rarity tiers (illustrative starting numbers, tuned during testing):\n\n| Rarity | Starting stats | Energy pool | Win-chance edge* |\n|---|---|---|---|\n| **Common** | lower | 10 | baseline (~47%) |\n| **Rare** | higher | 12 | ~49% |\n| **Epic** | higher still | 14 | ~56% |\n| **Legendary** | highest | 16 | ~60% |\n\n*Win chance shown against an evenly matched challenger at level 1; leveling your bull adds a few more points.\nThe Arena shows your live win chance before every duel, so there is no hidden math. These numbers are\nbounded on purpose: a well-played Common still wins plenty, and no bull is ever a guaranteed win.\n\n## Rank\n\nEvery Genesis bull also has a **collection rank** from 1 to 5,000, where **1 is the rarest**. Rank reflects\nhow unusual a bull's specific trait combination is. When you claim a bull you see its rank\n(\"Rank #864 of 5,000\"). In the app, a bull's rarity tier (Common, Rare, Epic, Legendary) is derived from its\nrank: the lower the rank number, the higher the tier.\n\n## Stats are earned, never bought or hacked\n\nYour stats come from **playing**: winning duels, leveling up, and training in the **Gym** (spend GRIT to raise Power, Speed, or Stamina). They live on the\nserver and cannot be edited from your browser. Nobody can pay to bump their Power, and nobody can hack their\nstats client-side. See [Fairness & Anti-Cheat](fairness.md)."},"leveling":{"title":"Leveling & Progression","md":"# Leveling & Progression\n\nYour bull grows stronger as you play. Leveling raises its stats toward its rarity ceiling, so a bull\nyou invest in becomes a real contender.\n\n## How you level\n\n* Winning and fighting duels earns **XP**.\n* When your XP bar fills, your bull **levels up**, and its Power, Speed, and Stamina each rise a\n  little.\n* Levels run from 1 upward, with each level needing more than the last, so late levels are a real\n  goal to chase.\n\n## The GRIT curve (design)\n\nIn the full design, leveling is paced by a rising **GRIT** cost curve: you fill each level bar with\nGRIT earned from play. Early levels are cheap; later ones cost a lot more. This makes GRIT a\nmeaningful sink and makes a single free bull take a while to max, which is exactly the intended\npace. Today, XP from duels drives leveling directly; the GRIT-paced curve arrives as progression\ndeepens.\n\n## Milestone gates (coming)\n\nEvery few levels there is a **milestone gate** that costs a hard resource:\n\n* **Before the token:** the gate costs **HAY** (bought with SOL or card).\n* **After the token launches:** the gate adds a small **$BULL** burn.\n\nThis keeps the game fully playable before the token exists, then switches on a clean token sink\nlater without changing how the game feels.\n\n## Ceilings, not power creep\n\nA bull levels up and grows stronger as it wins. That keeps the game fair: leveling\nis meaningful, but it cannot push any bull past the fair bounds of its bracket. See\n[Stats, Rarity & Rank](stats-rarity.md).\n\n## Owning more bulls\n\nProgression is per bull. Owning more bulls lets you level several in parallel and specialize each\nfor a discipline, which is breadth, not a shortcut to raw power.\n"},"breeding-fusion-gear":{"title":"Breeding, Fusion & Gear","md":"# Breeding, Fusion & Gear\n\n> **Status: Coming.** These systems are designed as the main supply and sink levers of the economy.\n\n## Breeding\n\nPair two eligible bulls to produce an **offspring** with mixed genetics. Breeding:\n\n* Burns GRIT (and $BULL once the token is live), a sink.\n* Is level-gated, so low-level breeding can produce a downgrade while high-level breeding can upgrade,\n  which puts a sink behind leveling.\n* Has **breed-count caps by rarity**, which limits how much new supply can enter.\n\n## Fusion\n\nSacrifice several bulls to create **one higher-rarity** bull (chance-based). Fusion:\n\n* **Burns the input bulls**, a real supply sink that keeps the collection from bloating.\n* Has a small chance at a special cosmetic trait (a capped, time-decaying flex), which creates\n  recurring demand.\n\n## Gear & cosmetics\n\nEquip horns, rings, brands, armor, and boots.\n\n* **Stat gear** provides **bounded sidegrades** within your bracket. It lets you specialize a bull\n  for a discipline; it does not raise your raw win rate.\n* **Cosmetics** are pure status. They make your bull look the part and are a clean sink.\n* A **re-equip cooldown** stops one gear set from serving many bulls, which keeps gear demand real.\n\nEvery one of these is designed as a **sink** first: they take currency and supply out of the\neconomy, which is what keeps the token healthy. See [Currencies](currencies.md).\n"},"arena":{"title":"The Arena (Duels)","md":"# The Arena (Duels)\n\nThe Arena is where BullQuest is won and lost. A duel is a fast, one-on-one battle decided by your bull's\nstats, the discipline and stance you choose, your bull's rarity and level, and a small, bounded dose of luck.\nEvery part of the result is calculated on the server, so it cannot be tampered with from your browser.\n\n## The flow of a duel\n\n1. You are matched against a **challenger** bull whose stats mirror your own, so the fight is close (a real\n   skill-based matchmaking system against other live players is on the [Roadmap](roadmap.md); today the\n   challenger is generated to be a fair, near-even opponent).\n2. You choose a **Discipline** and a **Stance**.\n3. You hit **Fight!**.\n4. The server resolves the duel, shows you the result, and pays out.\n\n## Disciplines (the stat matchup)\n\nYour Discipline decides which stat carries the fight. Each weights the three visible stats differently:\n\n| Discipline | Primary (60%) | Second (25%) | Third (15%) |\n|---|---|---|---|\n| **Clash** (head-on) | Power | Stamina | Speed |\n| **Chase** (pursuit) | Speed | Power | Stamina |\n| **Standoff** (endurance) | Stamina | Speed | Power |\n\nPick the discipline that plays to your bull's strengths. A high-Power bull wants Clash; a fast bull wants\nChase.\n\n## Stances (the blind gamble)\n\nBefore the duel you secretly pick a **Stance**. Stances beat each other in a rock-paper-scissors:\n\n```\nCHARGE  beats  FEINT  beats  BRACE  beats  CHARGE\n(reckless)     (trickery)    (dig in)\n```\n\nYou commit **blind** against the challenger's hidden stance, so this is a gamble, not a read: you cannot see\nwhat they will pick.\n\n* Win the guess and you get a **boost** to your score.\n* Mirror (same stance) is neutral.\n* Lose the guess and you take a small penalty.\n\nOver many duels the stance gamble evens out, but in any single fight it can swing the result, which keeps\nevery duel tense.\n\n## How a duel is scored\n\nEach side's score is calculated as:\n\n```\nScore = WeightedStats  x  StanceResult  x  Crit  x  Luck  x  RarityAndLevelEdge\n```\n\n* **WeightedStats**: your stats weighted by the chosen discipline.\n* **StanceResult**: boost, neutral, or penalty from the stance gamble.\n* **Crit**: a chance for a critical \"Rampage\" hit, driven by your hidden **Temper** stat. When it lands it\n  adds a bonus.\n* **Luck**: a small, bounded random factor, generated on the server (see\n  [Fairness & Anti-Cheat](fairness.md)).\n* **RarityAndLevelEdge**: a modest tilt from your bull's rarity and level (see\n  [Stats, Rarity & Rank](stats-rarity.md)).\n\nThe higher score wins. Because the challenger mirrors your power and the random factor is bounded, fights are\nclose and the stronger, better-played bull wins more often, not always.\n\n## Rewards\n\n* **Win**: you earn GRIT (about +20 at the standard stake) plus a chunk of XP.\n* **Loss**: you forfeit about 60% of your stake (a 20 GRIT stake costs you ~12) and earn a little XP. The stake is real, so pick your duels well.\n\nThe Arena shows exactly what you win and what you risk before you charge. (Redistributive prize pools, where\nwinnings come from other players' entry fees, arrive with the token phase; see [Currencies](currencies.md).)\n\n## Cost\n\nEach duel spends **2 Energy**, which refills over time. See [Energy](energy.md). Higher-stakes and\ntournament entries will use HAY once it ships.\n\n## Bear Raids (coming)\n\nAlongside duels, **Bear Raids** are co-op or solo battles against Bear-Market bosses, good for new and solo\nplayers. Planned for a later phase."},"energy":{"title":"Energy","md":"# Energy\n\nEnergy is how many duels your bull can fight before it needs to rest. It is the natural pace-setter of the\ngame and the reason to come back through the day.\n\n## How it works\n\n* Each bull has an **Energy pool** that scales with rarity: **10** for Common up to **16** for Legendary.\n* A duel costs **2 Energy**.\n* Energy **regenerates over time**, currently 1 point roughly every 15 minutes, up to your pool cap.\n  (Numbers are tuned during testing.)\n\nSo a full bull can fight several duels in a row, then tops back up on its own while you are away. Unspent\nregeneration is a gentle nudge to return.\n\n## Energy and rarity\n\nHigher-rarity bulls have **larger energy pools**, so they can play more per day. This is part of what rarity\nbuys: more plays per day (throughput). See [Stats, Rarity & Rank](stats-rarity.md).\n\n## Refills (live)\n\nYou can buy an instant **Energy refill** now with a small SOL payment. HAY may replace SOL for this later.\nSee [Currencies](currencies.md).\n\n## Multiple bulls, more energy\n\nBecause energy is per bull, owning more bulls means more total energy across your stable, and more duels per\nday. This is the main way owning more bulls scales your play, always breadth, never raw power."},"ranked-duels":{"title":"Ranked Duels & Seasons","md":"# Ranked Duels & Seasons\n\n> **Status: mostly coming.** Duels, GRIT rewards, and your win/loss record are **live today**, and there is a\n> live **GRIT leaderboard** you climb by gathering GRIT. The full seasonal ladder described below, with\n> tiers, promotions, and season resets, is on the [Roadmap](roadmap.md).\n\nRanked Duels are the planned competitive spine of BullQuest: a seasonal ladder you climb on skill.\n\n## Seasons (coming)\n\n* A season runs about 6 to 8 weeks.\n* At the end there is a **soft rank reset**, so there is fresh urgency each season without wiping your\n  progress entirely.\n\n## Tiers (coming)\n\nYou will climb through named tiers, each with sub-divisions (illustrative):\n\n```\nCalf  ->  Bullock  ->  Raging  ->  Stampede  ->  Bull Market  ->  Legendary\n```\n\nYou gain or lose rank points per duel, with promotions and relegations between tiers.\n\n## Rewards\n\nToday, winning a duel pays GRIT and XP, and your GRIT total sets your place on the leaderboard. The planned\nladder adds two more honest reward sources:\n\n* **Duel entry-fee pools** (redistributive): GRIT and, later, HAY staked into duels paid back out to winners.\n* **Seasonal chests** at tier thresholds (arriving with the token phase).\n\nTop tiers will also earn **cosmetics and titles**, pure status rewards.\n\n## Fair by design\n\nYou will always be matched inside a **Bull Rating bracket** and your ladder tier, so opponents are close to\nyou in power. Today, challengers already mirror your bull's power to keep fights close. See\n[The Arena](arena.md) and [Fairness & Anti-Cheat](fairness.md)."},"daily-quests":{"title":"Daily Quests","md":"# Daily Quests\n\nDaily Quests are small goals that reset each day and reward you for playing the way the game is meant to be\nplayed.\n\n## How they work\n\n* You get a small set of quests each day, for example \"Win 3 duels\", \"Spin the wheel\", or \"Enter the Arena\".\n* Complete a quest to earn a reward (GRIT and progress).\n* Clear all of the day's quests to earn a **bonus chest**.\n* Streak jars unlock at 3, 5, and 7 days of completions. Days do not need to be consecutive for the jars, so\n  missing a day is not the end of the world.\n\n## Earn GRIT beyond the daily loop\n\nOutside the daily quests, you can also earn GRIT by joining the community and inviting friends, in the\nin-app **Quests** page:\n\n* Verified **Discord** and **Telegram** joins and an **X** follow each pay a one-time GRIT reward.\n* **Referrals** pay **100 GRIT** for each friend who joins and reaches level 2, and they get **50 GRIT** too.\n\nAll of it grows your $BULL airdrop share. See the [Airdrop](airdrop.md).\n\n> Daily quest rewards are GRIT and progress today. As the economy deepens, some quests may feed seasonal\n> goals. See the [Roadmap](roadmap.md)."},"daily-spin":{"title":"Daily Spin","md":"# Daily Spin\n\nThe Daily Spin is your free once-a-day pull on the prize wheel. It is the easiest GRIT you will earn\nand a good reason to check in every day.\n\n## How it works\n\n* Every account gets **one free spin per day**.\n* The wheel has 12 segments, all **GRIT** rewards, from small to a rare **100 GRIT jackpot**.\n* The result is decided on the server, then the wheel lands on it, so what you see is what you get.\n* The reward is credited to your GRIT balance immediately.\n* After you spin, the card shows \"Come back tomorrow\" until your next free spin unlocks.\n\n## Odds\n\nSmaller GRIT prizes are common; the 100 GRIT jackpot is deliberately rare. You are guaranteed to win\nGRIT on every spin, there are no empty slots.\n\n## Extra spins (live)\n\nYou can buy **extra spins** now with a small SOL payment, beyond your free daily one. The price rises with each extra spin that day.\nHAY may replace SOL for extra spins later. Higher [Account\nRank](account-rank.md) will also raise your spin reward tier.\n"},"training":{"title":"Training","md":"# Training\n\n> **Status: Coming.** Training here means a planned idle-session feature, not the live Gym (where you spend GRIT to raise a stat). It is on the roadmap. This page describes how it will work.\n\nTraining is the idle-return hook of BullQuest. It replaces the \"walking\" of move-to-earn games with\nsomething a web-first game can deliver: start a session on a bull, come back later, and collect.\n\n## How it will work\n\n* Each bull can occupy a **Training Slot**.\n* You start a session and choose a length:\n\n| Session | Duration | Reward |\n|---|---|---|\n| Light | 2 hours | small GRIT + XP |\n| Standard | 4 hours | medium GRIT + XP |\n| Deep | 8 hours | large GRIT + XP (great overnight) |\n\n* When the session finishes, you collect your GRIT and XP, then start another.\n* Sessions bank while you are offline up to a cap, so returning the next day always has a payoff.\n\n## Multiple bulls\n\nOwning more bulls means more **Training Slots** running in parallel, so more GRIT per day. Slots\nbeyond a soft cap will cost HAY to keep active, which keeps the economy balanced.\n\n## Instant finish (coming)\n\nAn optional **instant finish** with HAY lets impatient players collect early. Like other HAY uses,\nit is a sink.\n"},"sector-wars":{"title":"Sector Wars","md":"# Sector Wars\n\nSector Wars is BullQuest's competitive faction game, and it is **live**. Back one of eight crypto-market\nsectors with your bull, win duels for it, and if your sector wins the cycle you split the pooled GRIT with\nthe other top backers.\n\n## The 3-day cycle\n\n1. **Back a sector.** Stake GRIT on one of the eight sectors (DeFi, Memes, L1s, Gaming, AI, RWA, NFTs,\n   Privacy) with your active bull. You can back only one sector per cycle.\n2. **Fight for it.** Win Arena duels while backing a sector to raise its contribution. Wins count for far\n   more than losses, and a bigger stake gives only a small, sub-linear boost, so skill leads.\n3. **Resolve.** Every 3 days the sector with the most total contribution wins.\n4. **Split the pool.** The winning sector's top backers split the pooled GRIT from every sector, minus a\n   15% burn. You must have won at least one duel while backing to be eligible.\n\n## Fair by design\n\n* **Skill first:** contribution comes mostly from duel **wins**, not from how much GRIT you stake.\n* **Anti-sybil enlist gate:** you need enough earned GRIT, a minimum level, and some account age to join.\n* **Caps and refunds:** duels that count are capped per day and per cycle, a single backer's share is\n  capped in large fields, and if too few real backers join, everyone is refunded.\n* **Emission-safe sink:** payouts only ever redistribute staked GRIT, never printed GRIT, and the 15% burn\n  makes every cycle a net GRIT sink.\n\nWinning also earns a Warlord / Sector Champion badge. GRIT you win here grows your $BULL airdrop share. See\n[Currencies](currencies.md) and the [Airdrop](airdrop.md).\n\n> Sector Wars v1 is played solo (you back a sector as an individual). Clans are a planned later layer, see\n> [Clans](clans.md)."},"clans":{"title":"Clans","md":"# Clans\n\n> **Status: Coming later.** Sector Wars v1 is live now and is played **solo**: you back a sector as an\n> individual, no clan required (see [Sector Wars](sector-wars.md)). Clans are a planned layer on top.\n\nClans will be BullQuest's guilds: a group you join to back sectors together, share a treasury, and split\nrewards as a team. They are designed to be native and automated in-game (no manual sign-up forms). When\nclans ship, Sector Wars gains a team dimension on top of the solo backing that exists today.\n"},"account-rank":{"title":"Account Rank","md":"# Account Rank\n\n> **Status: Coming.**\n\nAccount Rank is a separate, account-level rank (0 to 10) that reflects how active and invested you\nare. It is different from your [Ranked Duels](ranked-duels.md) ladder tier.\n\n## What it gates\n\nYour Account Rank raises:\n\n* Your **Daily Spin** reward tier.\n* Your daily **chest** size.\n* Marketplace **sell slots**.\n* Eligibility for **Sector captaincy**.\n\n## How it is calculated\n\nAccount Rank is based on a rolling window of:\n\n* Recent activity (duels and training over the last week or so).\n* Owned assets (the bulls you own).\n* Season performance.\n* Quest completion.\n\n## It decays, but fairly\n\nIf you go inactive, your Account Rank slowly decays, which nudges you to return. Here is the\nimportant part: Account Rank is **not** tied to holding the token. Many games punished you for\nselling by decaying your rank when your token balance dropped. BullQuest rewards **engagement and\nownership**, never \"hold the speculative token or lose your rank.\"\n"},"currencies":{"title":"Currencies: GRIT, HAY, $BULL","md":"# Currencies: GRIT, HAY, $BULL\n\nBullQuest uses three currencies, deliberately separated so each does one job well. This separation is the\ncore fix for the economy problems that sank move-to-earn tokens.\n\n## The one principle\n\n> The tradeable token's demand must not come from expecting to earn more of the token.\n\nThe game currency you grind (GRIT) is soft and off-chain, so grinding it can never become token sell\npressure. The tradeable token ($BULL) is scarce, and it is designed so you mostly **win it from other\nplayers' entry fees**, not from an inflation faucet. That single choice is why the economy is built to last.\n\n## GRIT (soft currency, live)\n\n* **What:** an off-chain, in-game currency. Never tradable, never cashable, no monetary value. You start\n  with a small balance.\n* **Earn it from:** duels, the Daily Spin, Daily Quests,\n  **Sector Wars** wins, **social quests** (Discord/Telegram/X), and **referrals**.\n* **Spend it on (live):** the **Gym** (train Power, Speed, Stamina) and staking to **back a sector** in\n  Sector Wars. More GRIT sinks arrive as systems ship.\n* **Why it matters:** GRIT is the basis for your **$BULL airdrop** share. The more GRIT you earn, the bigger\n  your slice of each airdrop round. See the [Airdrop](airdrop.md).\n\n## HAY (premium consumable, coming)\n\n* **What:** a consumable \"gas\" bought with $BULL, SOL, or a card.\n* **Spend it on:** energy refills, arena and tournament entry fees, temporary boosts, extra spins, and\n  crafting attempts.\n* **Why:** HAY is **burned on use**, which creates a steady, low-friction sink.\n\n## $BULL (the token, coming on Solana mainnet)\n\n* **What:** a Solana SPL token, hard-capped supply. The only liquid financial asset in the game.\n* **Demand comes from (non-reflexive):** utility (minting, breeding, high-stakes entries, premium cosmetics,\n  gear), status (holding tiers, exclusive events, governance), and **buyback-burn from real revenue**.\n* **How you would get it:** the live **airdrop** (10% of supply over 10 rounds, earned via GRIT), winning\n  redistributive prize pools, or buying it.\n\nSee [$BULL Tokenomics](tokenomics.md) and the [Airdrop](airdrop.md).\n\n> The $BULL token is planned and forward-looking. It may change, be delayed, or never launch, and nothing\n> here is a promise of value or a financial return. See the [Roadmap](roadmap.md) and [Terms](terms.md)."},"tokenomics":{"title":"$BULL Tokenomics","md":"# $BULL Tokenomics\n\n> **The one concrete, live commitment is the airdrop: 10% of supply over 10 rounds, earned by playing (see [Airdrop](airdrop.md)).** The token itself is not live. The allocation model below is a provisional starting point that will be finalized and **published at or before launch**; the airdrop is drawn from the community allocation.\n\n## Headline\n\n* **Token:** $BULL, an SPL token on **Solana mainnet**.\n* **Total supply:** **1,000,000,000 (1 billion), hard-capped.**\n* **Emission philosophy:** capped, throttled, and circuit-broken, never a per-user faucet.\n* **Disclosure:** the full vesting schedule is published at or before launch. Radical transparency\n  is the point.\n\n## Allocation\n\n| Bucket | % | Purpose | Vesting |\n|---|---|---|---|\n| **Play & Ecosystem Rewards** | 30% | Redistributive prize top-ups, capped seasonal emission, staking-for-access | 48-month capped release, circuit-broken |\n| **Community & Airdrops** | 8% | Player airdrops, Genesis-holder allocation, quests | Engagement-gated over 24 months |\n| **Treasury & LiveOps** | 17% | Ops, content, buyback-burn, partnerships, liquidity support | 6% at launch, then 36-month linear |\n| **Team & Advisors** | 15% | Founders and contributors | 12-month cliff, then 36-month linear |\n| **Investors** | 18% | Fundraise | 6 to 12-month cliff, then 24 to 36-month linear |\n| **Liquidity** | 12% | Deep launch liquidity | 100% at launch (locked) |\n\n## What this fixes\n\nThe token was designed by studying exactly how other move-to-earn tokens collapsed, and fixing each\ntrap:\n\n* **Deeper liquidity:** 12% at launch (three times deeper than the game we studied), so unlocks\n  cannot collapse the order book on their own.\n* **A tamer reward stream:** 30% over 48 months, capped and circuit-broken, so emission cannot\n  outrun the game's sinks, and it auto-throttles in a downturn.\n* **Smaller insider overhang** with **published long cliffs**, so there are no surprise unlocks.\n* **Real-revenue demand:** the treasury uses real revenue to **buy back and burn** $BULL, which is\n  demand that does not depend on anyone expecting to earn more token.\n\n## Launch unlock is small\n\nOnly about 15 to 17% of supply is circulating at launch (mostly the locked liquidity plus a small\ncommunity and treasury slice). Team and investors sit behind cliffs.\n\n> These numbers are a starting point and depend on the fundraise. The final, exact schedule is\n> published before the token exists.\n"},"marketplace":{"title":"Marketplace","md":"# Marketplace\n\nThe Marketplace is **live**. You can buy and sell bulls for real **SOL**, right in the Market tab.\n\n## Buying a bull\n\n* Every account starts with one free Genesis bull. To get more, open the **Market** and buy an available\n  bull. Price is set by rarity (roughly Common 0.05, Rare 0.25, Epic 0.60, Legendary 2.0 SOL).\n* You can also buy a bull another player has listed for resale.\n* Owning more bulls lets you play more and specialize. You pick one **active** bull for the Arena.\n\n## Selling your bull\n\n* List any bull you own (except your free starter bull) for a price in SOL.\n* When it sells you receive **85%**, with a **15% platform fee**. Payment is a single on-chain Solana\n  transaction that pays you and the treasury at the same time, so no one holds your funds in between.\n\n## Safe by design\n\n* Trades settle on Solana and are verified on-chain before ownership changes hands.\n* Settlement runs through locked, server-only routines, and there is no hot treasury key on any server.\n* Your free starter bull is non-sellable, and only available (unowned) bulls show as buyable.\n\n> Today \"ownership\" means the bull is tied to your account (website-first trading). Minting bulls as on-chain\n> NFTs is a separate later phase. See the [Roadmap](roadmap.md).\n\n## Where buying and selling happen\n\nBuying and selling bulls moves SOL, so it needs a connected wallet. **That happens in your web browser (Chrome, Safari, or desktop at bullquest.fun), not inside Telegram or the phone app**, because Telegram does not allow crypto payments in-app. It is the same account either way. See **Wallets & Sign-in** for details.\n"},"fairness":{"title":"Fairness & Anti-Cheat","md":"# Fairness & Anti-Cheat\n\nBullQuest is built so that nobody can cheat the outcome of a duel or their stats.\n\n## Server-authoritative outcomes\n\nEvery duel is resolved **on the server**, inside a database function. Your browser sends your choices\n(discipline, stance, stake); it does not send the result. This means:\n\n* You cannot edit your stats from the browser. Power, Speed, Stamina, level, XP, and your record are all\n  server-side and locked, so there is no way to hack a stronger bull.\n* You cannot forge a win. The math runs where you cannot touch it.\n\n## Randomness you cannot rig\n\nThe bounded random factor in a duel is generated **on the server** from a seed you cannot predict or control\n(it mixes server-side randomness with the exact moment of the request). Because the roll happens where you\ncannot reach it, you cannot force a favorable result from your browser.\n\n> **Coming:** full public commit-reveal verification, where the server publishes a hashed seed before the\n> duel and reveals it after so anyone can recompute and check the result. Today randomness is\n> server-controlled and tamper-resistant; the public-verification layer is a planned upgrade.\n\n## Close, fair fights\n\nToday every challenger is generated to **mirror your bull's power**, so fights are close and decided by your\ndiscipline, your stance gamble, your bull's rarity and level, and bounded luck, not by a lopsided matchup.\nFull skill-based matchmaking against other live players, with a Bull Rating system, is on the\n[Roadmap](roadmap.md).\n\n## No pay-to-win, little to bot\n\n* Your first bull is free and random, and you can never buy or edit raw stats, so there is no way to\n  purchase a win.\n* GRIT is a soft, off-chain currency with no cash value, and outcomes are server-side, so there is little to\n  gain from botting today. As the marketplace and token arrive, rate limits and anti-abuse measures scale up\n  with them.\n\n## Your account safety\n\nBullQuest never asks for your seed phrase or private key. Signing in with a wallet is a message signature,\nnot a transaction: it costs nothing and moves no funds. If anything ever asks for your seed phrase, it is\nnot us."},"roadmap":{"title":"Roadmap","md":"# Roadmap\n\nBullQuest ships in phases, on purpose: the game first, ownership and the token later, once people actually\nwant to play. Here is where things really stand.\n\n## Live now\n\n* **Play:** create an account (Google, email, Telegram, or a Solana wallet), claim your free Genesis bull, and duel in\n  the Arena (disciplines, blind stances, crit, bounded RNG, server-authoritative). Energy, real GRIT, the\n  Daily Spin, Daily Quests, streaks, and the **Gym** (spend GRIT to train stats).\n* **Sector Wars v1:** back one of eight crypto-market sectors, win duels for it, and split the pooled GRIT\n  if it wins the 3-day cycle.\n* **Marketplace:** buy and sell bulls for real SOL (website-first ownership, 15% fee).\n* **Social quests and referrals:** earn GRIT for joining our Discord and Telegram, following on X, and\n  inviting friends.\n* **$BULL airdrop rail:** register a payout wallet and earn your share by playing (10% of supply over 10\n  rounds). The token itself is not live yet. See the [Airdrop](airdrop.md).\n\n## Next\n\n* Deeper retention and seasonal content, account hardening, and a passwordless email option.\n* Clans layered on top of Sector Wars.\n\n## Later (token-last, on-chain last)\n\n* **$BULL token** launches on Solana mainnet, only after the game proves retention, with the full vesting\n  schedule published up front.\n* **On-chain ownership is last:** mint your bull as a real Solana asset. Until then your bull lives in your\n  account and is yours to keep and trade on the website.\n\n> We do not present a feature as done until it is. On-chain minting is deliberately last."},"faq":{"title":"FAQ","md":"# FAQ\n\n### Is BullQuest free?\n\nYes. You create an account and get a free Genesis bull, and the whole game loop (duels, spin, quests) is free\nto play. You never have to spend to compete.\n\n### Do I need a crypto wallet?\n\nNo. You can sign up with Google, email, or Telegram, all free. Connecting a Solana wallet (Phantom, Solflare, Backpack) is an\noptional, smoother way to sign in, and it will be needed later for on-chain features. See\n[Wallets & Sign-in](wallets.md).\n\n### Can I sign in with Google?\n\nYes. **Continue with Google** is the fastest one-tap way in, alongside email. A wallet is optional. See [Wallets & Sign-in](wallets.md).\n\n### How does the $BULL airdrop work?\n\nWe are committing **10% of $BULL supply** to an airdrop over about 3 months in **10 rounds** (~1% each ~9 days). Each round is split by how much **GRIT you earned in that window**, so playing more earns a bigger slice. Register a payout wallet in the app now; payouts are sent at token launch. It is forward-looking and not a promise of value. See the [Airdrop](airdrop.md).\n\n### Do I need SOL to play?\n\nNo, not to play or to earn your airdrop share. Signing in with a wallet is a free message signature, not a\ntransaction. You only need SOL to **buy or sell bulls in the live Marketplace** or for optional paid extras\n(an extra spin, an energy refill). Minting bulls on-chain is a later phase.\n\n### Is my bull an NFT on-chain?\n\nNot yet. Today your bull is tied to your BullQuest account. Minting it as a real Solana asset is a planned\nphase; when it ships you will be able to mint the bull you already own. See the [Roadmap](roadmap.md).\n\n### Can I earn real money right now?\n\nNo, and that is by design. Today you earn GRIT, a soft in-game currency that is not tradable or cashable. The\ntradeable $BULL token is planned for after the game proves retention, and even then it is designed so you\nearn by winning other players' entry fees, not from an inflation faucet.\n\n### Does rarity or spending let me win more?\n\nRarity gives a **small, bounded edge** to your win chance, and higher-rarity bulls have bigger energy pools,\nso they can play more. But your first bull is free and random, you can never buy or edit raw stats, and the\nArena shows your exact win chance before every duel. So higher rarity helps a little; it is never an auto-win\nand nobody buys their way to a better win rate. See [Stats, Rarity & Rank](stats-rarity.md).\n\n### Why did my duel lose when I guessed the stance right?\n\nWinning the stance gamble tips the fight in your favor; it does not guarantee a win. Your stats, the\nchallenger's stats, the crit rolls, rarity and level, and bounded luck all factor in. That variance is what\nkeeps the Arena tense. See [The Arena](arena.md).\n\n### How does energy work?\n\nEach duel costs 2 energy, and energy refills about 1 point every 15 minutes. Higher-rarity bulls have bigger\nenergy pools (10 for Common up to 16 for Legendary). See [Energy](energy.md).\n\n### My bull shows a placeholder image, not real art. Why?\n\nThe 5,000-bull art set is being uploaded in batches. If your bull shows a placeholder, its image is still on\nits way and will appear shortly.\n\n### How do I get support?\n\nUse the in-app **Feedback** button or the **Bull Assistant** chat any time. Full support channels open\nalongside the public launch.\n\n> Brand, numbers, and exact rules in these docs are provisional and tuned during testing."},"terms":{"title":"Terms of Use","md":"# Terms of Use\n\n_Last updated: July 2026. BullQuest is in active development (beta); these terms are a starting point and will be updated before public launch._\n\nWelcome to BullQuest (\"BullQuest\", \"we\", \"us\"). By creating an account or playing, you agree to these Terms of Use. If you do not agree, please do not use BullQuest.\n\n## 1. Who can play\n\nYou must be at least 13 years old (or the minimum digital-consent age where you live) and able to form a binding agreement. Do not use BullQuest where it is prohibited by law.\n\n## 2. Your account\n\n- You are responsible for keeping your login (email and password, or your Solana wallet) secure.\n- One account per person. Do not create multiple accounts to farm rewards.\n- We never ask for your wallet seed phrase or private keys, and we never take custody of your funds. Signing in with a wallet is a message signature, not a transaction.\n\n## 3. The game and GRIT\n\nBullQuest is a free-to-play game. **GRIT is a soft, in-game currency with no monetary value.** It is not money, is not redeemable for cash, and cannot be sold, traded, or transferred off the platform. Your bull, stats, GRIT, and other in-game items are a limited license to use inside the game, not property or a financial instrument, and we may adjust them as part of running and balancing the game.\n\n## 4. Forward-looking features and the $BULL token\n\nParts of BullQuest describe planned features, including the **$BULL token and any airdrop**. These are **forward-looking and are not a promise or guarantee.** They may change, be delayed, or never launch. Nothing in BullQuest is an offer or solicitation to buy any token or security, is financial or investment advice, or is a guarantee of any future value, reward, or airdrop. Do not play expecting financial gain. Any future token or airdrop, if it happens, will have its own separate terms.\n\n## 5. Fair play\n\nDo not cheat, exploit bugs, use bots or automation, reverse-engineer, tamper with game data, or otherwise gain an unfair advantage. We may suspend or terminate accounts that break these rules or abuse the service, and we may remove rewards obtained unfairly.\n\n## 6. Availability\n\nBullQuest is provided \"as is\" and \"as available\", without warranties of any kind. We may change, suspend, or discontinue any part of the game at any time, and we do not guarantee uninterrupted or error-free operation.\n\n## 7. Limitation of liability\n\nTo the maximum extent permitted by law, BullQuest and its team are not liable for any indirect, incidental, or consequential damages, or for any loss of data, in-game items, GRIT, or anticipated rewards, arising from your use of the game.\n\n## 8. Changes\n\nWe may update these terms as the game evolves. Material changes will be shown here with a new date. Continuing to play after an update means you accept the updated terms.\n\n## 9. Contact\n\nQuestions? Reach us through the in-app **Feedback** button or the official BullQuest channels.\n"},"privacy":{"title":"Privacy Policy","md":"# Privacy Policy\n\n_Last updated: July 2026. BullQuest is in active development; this policy will be updated before public launch._\n\nThis policy explains what BullQuest collects and how we use it. We collect only what we need to run the game.\n\n## What we collect\n\n- **Account:** if you sign up with email, your email address and a password (stored hashed, never in plain text). If you sign in with a Solana wallet, your **public wallet address** (never your seed phrase or private keys).\n- **Gameplay:** your bull, its stats and record, your GRIT balance, and your duels, quests, and spins.\n- **Feedback:** anything you send through the in-app Feedback tool, including an optional screenshot you choose to attach.\n- **Technical:** basic technical data (such as IP address and device or browser info) processed by our infrastructure providers to deliver and secure the service.\n\n## How we use it\n\nTo create and run your account, provide the game, save your progress, prevent cheating and abuse, respond to feedback and support, and improve BullQuest. We do **not** sell your personal data.\n\n## Who processes it\n\nBullQuest runs on third-party infrastructure that processes data on our behalf, including **Supabase** (database, authentication, and file storage), **Cloudflare** (bot and abuse protection), and **GitHub Pages** (web hosting). Each has its own security and privacy practices.\n\n## Local storage\n\nWe store small amounts of data in your browser, such as your login session and preferences like your login streak and whether you have seen the intro guide. You can clear this from your browser at any time.\n\n## Wallet and blockchain\n\nA Solana wallet address is public on the blockchain by nature. We use it only to identify your account. We never receive or store your seed phrase or private keys, and signing in never moves funds.\n\n## Keeping and deleting data\n\nWe keep your data while your account is active. You can request access to or deletion of your data through the in-app Feedback button or the official BullQuest channels. Deleting your account releases your bull back into the collection.\n\n## Children\n\nBullQuest is not directed at children under 13 (or the minimum age where you live). We do not knowingly collect their data.\n\n## Changes\n\nWe may update this policy as the game evolves; material changes will be shown here with a new date.\n\n## Contact\n\nReach us through the in-app **Feedback** button or the official BullQuest channels.\n"},"airdrop":{"title":"$BULL Airdrop","md":"# $BULL Airdrop\n\nYou can **earn toward the $BULL airdrop right now**, even though the token itself has not launched. The more\nyou play, the bigger your share.\n\n## How it works\n\n* We are committing **10% of the total $BULL supply** to the airdrop, released over about **3 months in 10\n  rounds** (roughly **1% of supply every ~9 days**).\n* Each round is split across players by **how much GRIT you earned during that round's window**. Play more in\n  a window, earn a bigger slice of that round.\n* There is no single cutoff to race: every round rewards whoever showed up and played during it.\n\n## Claiming\n\n* Open the **Airdrop** page in the app and **register your Solana payout wallet** (a receive-only address).\n  BullQuest never asks for your seed phrase or private key, and never moves your funds.\n* One payout wallet per account (anti-sybil). At token launch, payouts are sent to your registered wallet.\n* Later rounds are **bought back from the market** using trading fees and app income, so the airdrop is not\n  just printed supply.\n\n## Earning GRIT for it\n\nEverything that earns GRIT grows your share: duels, the Daily Spin, Daily Quests, the Gym, Sector Wars wins,\nsocial quests, and referrals.\n\n> The token and airdrop are forward-looking and may change, be delayed, or not launch. Nothing here is a\n> promise of value or a financial return, and this is not financial advice. See the [Terms of Use](terms.md).\n\n## Registering your payout wallet on Telegram or the app\n\nYou can register or change your payout wallet by **pasting your Solana address**, and that works everywhere, including inside Telegram and the phone app. A payout address is receive-only, so it needs no wallet connection, no signing, and no payment. (Connecting a wallet or paying with SOL still needs a web browser.)\n"}},"first":"README"};

function buildNav(filter){
  var list = document.getElementById('navlist'), html = '';

    var items = g.items.filter(function(i){ return !filter || i.title.toLowerCase().indexOf(filter.toLowerCase())>=0; });

  });

  markActive();
}

}

}
function render(){
  var slug = (location.hash||'#'+DOC.first).slice(1);

  var c = document.getElementById('content');
  if(typeof marked!=='undefined' && marked.parse){ c.innerHTML = marked.parse(pg.md); } else { c.textContent = pg.md; }
  // rewrite internal .md links to hash routes
  [].forEach.call(c.querySelectorAll('a[href$=".md"]'), function(a){ a.setAttribute('href', '#'+a.getAttribute('href').replace('.md','')); });
  document.title = pg.title + ' - BullQuest Docs';

  var idx = flat.findIndex(function(i){ return i.slug===slug; });
  var pv = idx>0?flat[idx-1]:null, nx = idx>=0&&idx<flat.length-1?flat[idx+1]:null, ph='';

  document.getElementById('pager').innerHTML = ph;

  document.body.classList.remove('nav-open');
  window.scrollTo(0,0);
}

  function typing(on){ if(on){ if(typingEl)return; typingEl=document.createElement('div'); typingEl.className='dqai-typing'; typingEl.innerHTML='<i></i><i></i><i></i>'; body.appendChild(typingEl); body.scrollTop=body.scrollHeight; } else if(typingEl){ typingEl.remove(); typingEl=null; } }
  function greet(){ if(greeted)return; greeted=true; addMsg('bot',"Hey! I'm the Bull Assistant. Ask me anything about BullQuest: duels, your free bull, GRIT, the roadmap, whatever you need."); var c=document.createElement('div'); c.className='dqai-chips'; ['How do duels work?','Is it free?','Do I need a wallet?','How does rarity work?'].forEach(function(q){ var b=document.createElement('button'); b.className='dqai-chip'; b.type='button'; b.textContent=q; b.addEventListener('click',function(){ input.value=q; send(); }); c.appendChild(b); }); body.appendChild(c); }
  function send(){ var q=(input.value||'').trim(); if(!q||busy)return; input.value=''; addMsg('me',q); convo.push({role:'user',content:q}); busy=true; sendBtn.disabled=true; typing(true);
    fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},body:JSON.stringify({messages:convo.slice(-10)})})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(d){ typing(false); var rep=(d&&d.reply)||"Sorry, I couldn't answer that one."; addMsg('bot',rep); convo.push({role:'assistant',content:rep}); })
      .catch(function(){ typing(false); addMsg('bot',"I can't reach the assistant right now, please try again in a moment."); })
      .then(function(){ busy=false; sendBtn.disabled=false; input.focus(); });
  }
  btn.addEventListener('click',function(){ if(panel.classList.contains('on')){ panel.classList.remove('on'); } else { panel.classList.add('on'); greet(); setTimeout(function(){ input.focus(); },60); } });
  panel.querySelector('.x').addEventListener('click',function(){ panel.classList.remove('on'); });
  sendBtn.addEventListener('click',send);
  input.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); send(); } });
})();
</script>
</body></html>
