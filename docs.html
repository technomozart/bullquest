var DOC = {"nav": [{"group": "Welcome", "items": [{"slug": "README", "title": "\ud83d\udcd6  About BullQuest"}, {"slug": "getting-started", "title": "\ud83d\ude80  Getting Started"}, {"slug": "wallets", "title": "\ud83d\udd11  Wallets & Sign-in"}]}, {"group": "Your Bulls", "items": [{"slug": "bulls", "title": "\ud83d\udc02  Bulls & the Genesis Collection"}, {"slug": "stats-rarity", "title": "\ud83d\udcca  Stats, Rarity & Rank"}, {"slug": "leveling", "title": "\ud83d\udcc8  Leveling & Progression"}, {"slug": "breeding-fusion-gear", "title": "\ud83e\uddec  Breeding, Fusion & Gear"}]}, {"group": "Playing", "items": [{"slug": "arena", "title": "\u2694\ufe0f  The Arena (Duels)"}, {"slug": "energy", "title": "\u26a1  Energy"}, {"slug": "ranked-duels", "title": "\ud83c\udfc6  Ranked Duels & Seasons"}, {"slug": "daily-quests", "title": "\u2705  Daily Quests"}, {"slug": "daily-spin", "title": "\ud83c\udfa1  Daily Spin"}, {"slug": "training", "title": "\ud83c\udfcb\ufe0f  Training"}]}, {"group": "Meta Game", "items": [{"slug": "sector-wars", "title": "\ud83d\uddfa\ufe0f  Sector Wars"}, {"slug": "clans", "title": "\ud83d\udee1\ufe0f  Clans"}, {"slug": "account-rank", "title": "\u2b50  Account Rank"}]}, {"group": "Economy", "items": [{"slug": "currencies", "title": "\ud83d\udcb0  Currencies: GRIT, HAY, $BULL"}, {"slug": "tokenomics", "title": "\ud83e\ude99  $BULL Tokenomics"}, {"slug": "marketplace", "title": "\ud83d\uded2  Marketplace"}]}, {"group": "More", "items": [{"slug": "fairness", "title": "\u2696\ufe0f  Fairness & Anti-Cheat"}, {"slug": "roadmap", "title": "\ud83e\udded  Roadmap"}, {"slug": "faq", "title": "\u2753  FAQ"}]}, {"group": "Legal", "items": [{"slug": "terms", "title": "\ud83d\udcdc  Terms of Use"}, {"slug": "privacy", "title": "\ud83d\udd12  Privacy Policy"}]}], "pages": {"README": {"title": "About BullQuest", "md": "# About BullQuest\n\nBullQuest is a free-to-play, skill-and-stats bull game. You claim your own Genesis bull, train it up\nthrough quests and duels, and charge into the Arena to gather GRIT and climb the board. It is web-first,\nplays in your browser, and every match is resolved on our server, so nobody can hack the outcome.\n\nIf you have played a creature-collector or move-to-earn game, the shape will feel familiar: a collectible\nbull with stats and rarity, an arena where you battle, daily rewards, and a layered currency system.\nBullQuest takes those ideas and fixes the parts that broke them, most importantly the economy (see\n[Currencies](currencies.md) and [$BULL Tokenomics](tokenomics.md)).\n\n## The three pillars\n\n* **Bull Ownership.** Each bull is uniquely yours, with its own rarity, stats, and history, tied to your\n  account from day one. See [Bulls & the Genesis Collection](bulls.md).\n* **Arena Duels.** Fast head-to-head battles decided by your bull's stats, your discipline and stance\n  choices, your bull's rarity and level, and a bounded dose of luck. See [The Arena](arena.md).\n* **Sector Wars** *(coming).* Join a clan and fight for control of crypto-market sectors over a weekly\n  cycle. See [Sector Wars](sector-wars.md).\n\n## What makes BullQuest different\n\n* **No pay-to-win.** Your first bull is free and its rarity is random, so nobody buys their way to a\n  stronger bull today. Rarity gives a modest, bounded edge (see [Stats, Rarity & Rank](stats-rarity.md)),\n  never a runaway advantage, and you can never edit or buy raw stats.\n* **Every action pays something.** Even a lost duel returns some GRIT. A spin always adds GRIT. Loss should\n  never feel like wasted time.\n* **An economy built to last.** GRIT, the currency you grind, is soft and off-chain, so it can never become\n  token sell pressure. The tradeable **$BULL** token (coming) is designed to draw its value from real\n  demand and redistribution, not an endless faucet, which is the trap that sank similar games. See\n  [Currencies](currencies.md).\n\n## What is live today\n\nBullQuest is being built in the open. Live right now: create an account (email or Solana wallet), claim your\nfree Genesis bull, real Arena duels against challenger bulls, energy, a real GRIT balance, the daily spin,\ndaily quests, and a GRIT leaderboard. Features marked **Coming** in these docs (the $BULL token, HAY,\nbreeding, the marketplace, training, full Sector Wars, seasonal ranked ladders, on-chain minting) are on the\n[Roadmap](roadmap.md) and ship in phases. Where a page describes a planned feature, it says so.\n\n> Brand and numbers are provisional and will be tuned during testing."}, "getting-started": {"title": "Getting Started", "md": "# Getting Started\n\nGetting into BullQuest takes under a minute, and you walk away with a free Genesis bull.\n\n## 1. Open the game\n\nGo to the BullQuest web app in any modern browser (desktop or mobile). There is nothing to download.\n\n## 2. Create your account\n\nOn the welcome screen you have two ways in:\n\n* **Sign in with Solana** (recommended if you have a wallet): connect Phantom, Solflare, or Backpack and\n  sign a one-time message. No password to remember. See [Wallets & Sign-in](wallets.md).\n* **Continue with email**: sign up with an email and a password. No crypto needed at all.\n\nEither way, your account is created instantly.\n\n## 3. Claim your free bull\n\nThe moment your account is created, BullQuest hands you one **free Genesis bull**, drawn at random from the\n5,000-bull collection. You will see a reveal card with its name, rarity, and rank. That bull is yours, tied\nto your account, with its own stats and history.\n\n> One free bull per account. Owning more bulls later lets you play more and specialize (see\n> [Stats, Rarity & Rank](stats-rarity.md)).\n\n## 4. Your first duel\n\nHead to the **Arena** from the bottom navigation:\n\n1. Pick a **Discipline** (Clash, Chase, or Standoff). This chooses which of your bull's stats decides the\n   fight.\n2. Pick a **Stance** (Charge, Feint, or Brace). You commit it blind against the challenger's hidden stance,\n   so it is a gamble that swings the fight.\n3. Hit **Charge!** to duel.\n\nYou win or lose based on your stats, your stance gamble, your bull's rarity and level, your hidden Temper\n(crit) stat, and a small dose of luck. Win and you earn GRIT and XP. Even a loss returns some GRIT. Each\nduel spends a little Energy, which refills over time. Full details in [The Arena](arena.md).\n\n## 5. Come back daily\n\n* Take your free **Daily Spin** for 10 to 100 GRIT.\n* Clear your **Daily Quests**.\n* Keep your **login streak** alive for steady bonus GRIT.\n\nThat is the loop: claim, train, charge, climb."}, "wallets": {"title": "Wallets & Sign-in", "md": "# Wallets & Sign-in\n\nBullQuest runs on **Solana mainnet**. You do not need a wallet to play, but connecting one is the\nsmoothest way to sign in and is required later for anything on-chain.\n\n## Two ways to sign in\n\n### Sign in with Solana\n\nSupported wallets:\n\n* **Phantom**\n* **Solflare**\n* **Backpack**\n\nWhen you click a wallet, it opens and asks you to **sign a message** (not a transaction, so it\ncosts nothing and moves no funds). BullQuest verifies that signature on the server and logs you in.\nThe same wallet always returns to the same account, so your bull and progress are always there.\n\n> BullQuest never asks for your seed phrase or private key, and signing in never sends a\n> transaction or spends SOL. If anything ever asks for your seed phrase, it is not us.\n\n### Continue with email\n\nPrefer no crypto? Sign up with an email and password. You get the exact same game and the same free\nbull. You can think about a wallet later.\n\n## Do I need SOL?\n\nNot to play. Signing in with a wallet is free (it is a signature, not a transaction). You will only\nneed SOL or $BULL once on-chain features ship (minting your bull, high-stakes entries, the\nmarketplace). Those are on the [Roadmap](roadmap.md).\n\n## Are my bulls on-chain?\n\n**Not yet.** Today your bull lives in your BullQuest account. On-chain ownership (minting your bull\nas a real Solana asset) is a planned phase. When it ships, you will be able to mint the bull you\nalready own. Until then, \"your bull\" means it is tied to your account and yours to keep and train.\n\n## Switching or losing access\n\n* **Wallet sign-in:** your account is your wallet. Keep your wallet safe and you keep your account.\n* **Email sign-in:** use the same email and password. A password reset flow is on the way.\n"}, "bulls": {"title": "Bulls & the Genesis Collection", "md": "# Bulls & the Genesis Collection\n\nBulls are the heart of BullQuest. Every player owns at least one, and each is a unique character\nwith its own look, stats, rarity, and record.\n\n## The Genesis Collection\n\nThe founding collection is **5,000 Genesis bulls**, hand-designed and generated as a layered art\nset. Every bull is a unique combination of traits, so no two are alike. Every new account is given\none Genesis bull for free, drawn at random from the pool. Once a bull is claimed it is off the\ntable, so the collection is finite.\n\n## What a bull is made of\n\nEach bull is built from four visible art layers plus a set of game stats:\n\n* **Body** (hide color): the base color of the bull.\n* **Belly**: the belly patch color.\n* **Horns**: shape and material, from plain nubs to legendary lava, gold, galaxy, and more.\n* **Face**: the expression and muzzle.\n\nColors are coordinated on purpose. A bull's body, belly, and horns share a color temperature (warm\nor cool), with neutral tones that pair with anything, so every bull looks intentional rather than\nrandom.\n\nUnder the hood, a bull also has combat stats (Power, Speed, Stamina, and hidden Temper), a level,\nenergy, and a win/loss record. See [Stats, Rarity & Rank](stats-rarity.md).\n\n## Genesis perks\n\nGenesis bulls are the founding premium collection. They carry permanent, **bounded** perks:\nprestige cosmetics (think golden horns and auras on the rarest ones), a small GRIT-gain bonus,\npriority access to events, and a modest breeding-luck edge when breeding ships.\n\nIn a fight, a Genesis bull's only edge comes from its **rarity and level** - a small, bounded tilt to its win chance that the Arena shows you before every duel (see [Stats, Rarity & Rank](stats-rarity.md)). There is no separate hidden Genesis multiplier stacked on top, and you can never buy or edit raw stats, so no bull is ever an auto-win.\n\n## Owning more than one\n\nYou start with one. Later you will be able to own more bulls (through the marketplace, breeding, or\nfuture drops). More bulls means:\n\n* More total **Energy** across your stable, so more duels per day.\n* The ability to **specialize**, for example a Clash bull, a Chase bull, and a Standoff bull.\n* More **Sector Wars** deployments.\n\nMore bulls scale your *breadth of participation*, with deliberately diminishing returns, never your\nraw power. See [Currencies](currencies.md) for why the economy is built this way.\n"}, "stats-rarity": {"title": "Stats, Rarity & Rank", "md": "# Stats, Rarity & Rank\n\n## The four stats\n\nEvery bull has four stats. Three are visible and drive combat; one is hidden and creates build variety.\n\n| Stat | What it does | Where it matters |\n|---|---|---|\n| **Power** | Raw charge force | Primary stat in the **Clash** discipline |\n| **Speed** | Agility and initiative | Primary stat in the **Chase** discipline |\n| **Stamina** | Endurance and grit | Primary stat in the **Standoff** discipline |\n| **Temper** *(hidden)* | Wildness | Drives the chance and size of a critical \"Rampage\" hit |\n\nYour starter bull begins with modest, slightly varied stats so no two bulls play identically. Winning duels\nearns XP, and every level-up raises Power, Speed, and Stamina.\n\n## Rarity\n\nRarity does three things: it sets a bull's **starting stats and energy pool**, it gives a **small, bounded\nedge to its win chance**, and it carries **prestige**. Higher rarity is an advantage, but a measured one, not\nan auto-win, and because your first bull is free and random, nobody buys a better win rate today.\n\nThe four live rarity tiers (illustrative starting numbers, tuned during testing):\n\n| Rarity | Starting stats | Energy pool | Win-chance edge* |\n|---|---|---|---|\n| **Common** | lower | 10 | baseline (~47%) |\n| **Rare** | higher | 12 | ~49% |\n| **Epic** | higher still | 14 | ~56% |\n| **Legendary** | highest | 16 | ~60% |\n\n*Win chance shown against an evenly matched challenger at level 1; leveling your bull adds a few more points.\nThe Arena shows your live win chance before every duel, so there is no hidden math. These numbers are\nbounded on purpose: a well-played Common still wins plenty, and no bull is ever a guaranteed win.\n\n## Rank\n\nEvery Genesis bull also has a **collection rank** from 1 to 5,000, where **1 is the rarest**. Rank reflects\nhow unusual a bull's specific trait combination is. When you claim a bull you see its rank\n(\"Rank #864 of 5,000\"). In the app, a bull's rarity tier (Common, Rare, Epic, Legendary) is derived from its\nrank: the lower the rank number, the higher the tier.\n\n## Stats are earned, never bought or hacked\n\nYour stats come from **playing**: winning duels and leveling up (training is coming). They live on the\nserver and cannot be edited from your browser. Nobody can pay to bump their Power, and nobody can hack their\nstats client-side. See [Fairness & Anti-Cheat](fairness.md)."}, "leveling": {"title": "Leveling & Progression", "md": "# Leveling & Progression\n\nYour bull grows stronger as you play. Leveling raises its stats toward its rarity ceiling, so a bull\nyou invest in becomes a real contender.\n\n## How you level\n\n* Winning and fighting duels earns **XP**.\n* When your XP bar fills, your bull **levels up**, and its Power, Speed, and Stamina each rise a\n  little.\n* Levels run from 1 upward, with each level needing more than the last, so late levels are a real\n  goal to chase.\n\n## The GRIT curve (design)\n\nIn the full design, leveling is paced by a rising **GRIT** cost curve: you fill each level bar with\nGRIT earned from play. Early levels are cheap; later ones cost a lot more. This makes GRIT a\nmeaningful sink and makes a single free bull take a while to max, which is exactly the intended\npace. Today, XP from duels drives leveling directly; the GRIT-paced curve arrives as progression\ndeepens.\n\n## Milestone gates (coming)\n\nEvery few levels there is a **milestone gate** that costs a hard resource:\n\n* **Before the token:** the gate costs **HAY** (bought with SOL or card).\n* **After the token launches:** the gate adds a small **$BULL** burn.\n\nThis keeps the game fully playable before the token exists, then switches on a clean token sink\nlater without changing how the game feels.\n\n## Ceilings, not power creep\n\nA bull can only level toward the ceiling set by its **rarity**. That keeps the game fair: leveling\nis meaningful, but it cannot push any bull past the fair bounds of its bracket. See\n[Stats, Rarity & Rank](stats-rarity.md).\n\n## Owning more bulls\n\nProgression is per bull. Owning more bulls lets you level several in parallel and specialize each\nfor a discipline, which is breadth, not a shortcut to raw power.\n"}, "breeding-fusion-gear": {"title": "Breeding, Fusion & Gear", "md": "# Breeding, Fusion & Gear\n\n> **Status: Coming.** These systems are designed as the main supply and sink levers of the economy.\n\n## Breeding\n\nPair two eligible bulls to produce an **offspring** with mixed genetics. Breeding:\n\n* Burns GRIT (and $BULL once the token is live), a sink.\n* Is level-gated, so low-level breeding can produce a downgrade while high-level breeding can upgrade,\n  which puts a sink behind leveling.\n* Has **breed-count caps by rarity**, which limits how much new supply can enter.\n\n## Fusion\n\nSacrifice several bulls to create **one higher-rarity** bull (chance-based). Fusion:\n\n* **Burns the input bulls**, a real supply sink that keeps the collection from bloating.\n* Has a small chance at a special cosmetic trait (a capped, time-decaying flex), which creates\n  recurring demand.\n\n## Gear & cosmetics\n\nEquip horns, rings, brands, armor, and boots.\n\n* **Stat gear** provides **bounded sidegrades** within your bracket. It lets you specialize a bull\n  for a discipline; it does not raise your raw win rate.\n* **Cosmetics** are pure status. They make your bull look the part and are a clean sink.\n* A **re-equip cooldown** stops one gear set from serving many bulls, which keeps gear demand real.\n\nEvery one of these is designed as a **sink** first: they take currency and supply out of the\neconomy, which is what keeps the token healthy. See [Currencies](currencies.md).\n"}, "arena": {"title": "The Arena (Duels)", "md": "# The Arena (Duels)\n\nThe Arena is where BullQuest is won and lost. A duel is a fast, one-on-one battle decided by your bull's\nstats, the discipline and stance you choose, your bull's rarity and level, and a small, bounded dose of luck.\nEvery part of the result is calculated on the server, so it cannot be tampered with from your browser.\n\n## The flow of a duel\n\n1. You are matched against a **challenger** bull whose stats mirror your own, so the fight is close (a real\n   skill-based matchmaking system against other live players is on the [Roadmap](roadmap.md); today the\n   challenger is generated to be a fair, near-even opponent).\n2. You choose a **Discipline** and a **Stance**.\n3. You hit **Charge!**.\n4. The server resolves the duel, shows you the result, and pays out.\n\n## Disciplines (the stat matchup)\n\nYour Discipline decides which stat carries the fight. Each weights the three visible stats differently:\n\n| Discipline | Primary (60%) | Second (25%) | Third (15%) |\n|---|---|---|---|\n| **Clash** (head-on) | Power | Stamina | Speed |\n| **Chase** (pursuit) | Speed | Power | Stamina |\n| **Standoff** (endurance) | Stamina | Speed | Power |\n\nPick the discipline that plays to your bull's strengths. A high-Power bull wants Clash; a fast bull wants\nChase.\n\n## Stances (the blind gamble)\n\nBefore the duel you secretly pick a **Stance**. Stances beat each other in a rock-paper-scissors:\n\n```\nCHARGE  beats  FEINT  beats  BRACE  beats  CHARGE\n(reckless)     (trickery)    (dig in)\n```\n\nYou commit **blind** against the challenger's hidden stance, so this is a gamble, not a read: you cannot see\nwhat they will pick.\n\n* Win the guess and you get a **boost** to your score.\n* Mirror (same stance) is neutral.\n* Lose the guess and you take a small penalty.\n\nOver many duels the stance gamble evens out, but in any single fight it can swing the result, which keeps\nevery duel tense.\n\n## How a duel is scored\n\nEach side's score is calculated as:\n\n```\nScore = WeightedStats  x  StanceResult  x  Crit  x  Luck  x  RarityAndLevelEdge\n```\n\n* **WeightedStats**: your stats weighted by the chosen discipline.\n* **StanceResult**: boost, neutral, or penalty from the stance gamble.\n* **Crit**: a chance for a critical \"Rampage\" hit, driven by your hidden **Temper** stat. When it lands it\n  adds a bonus.\n* **Luck**: a small, bounded random factor, generated on the server (see\n  [Fairness & Anti-Cheat](fairness.md)).\n* **RarityAndLevelEdge**: a modest tilt from your bull's rarity and level (see\n  [Stats, Rarity & Rank](stats-rarity.md)).\n\nThe higher score wins. Because the challenger mirrors your power and the random factor is bounded, fights are\nclose and the stronger, better-played bull wins more often, not always.\n\n## Rewards\n\n* **Win**: you earn GRIT (about +14 at the standard stake) plus a chunk of XP.\n* **Loss**: you still get some GRIT back and a little XP. A duel is never a total loss.\n\nThe Arena shows exactly what you win and what you risk before you charge. (Redistributive prize pools, where\nwinnings come from other players' entry fees, arrive with the token phase; see [Currencies](currencies.md).)\n\n## Cost\n\nEach duel spends **2 Energy**, which refills over time. See [Energy](energy.md). Higher-stakes and\ntournament entries will use HAY once it ships.\n\n## Bear Raids (coming)\n\nAlongside duels, **Bear Raids** are co-op or solo battles against Bear-Market bosses, good for new and solo\nplayers. Planned for a later phase."}, "energy": {"title": "Energy", "md": "# Energy\n\nEnergy is how many duels your bull can fight before it needs to rest. It is the natural pace-setter of the\ngame and the reason to come back through the day.\n\n## How it works\n\n* Each bull has an **Energy pool** that scales with rarity: **10** for Common up to **16** for Legendary.\n* A duel costs **2 Energy**.\n* Energy **regenerates over time**, currently 1 point roughly every 15 minutes, up to your pool cap.\n  (Numbers are tuned during testing.)\n\nSo a full bull can fight several duels in a row, then tops back up on its own while you are away. Unspent\nregeneration is a gentle nudge to return.\n\n## Energy and rarity\n\nHigher-rarity bulls have **larger energy pools**, so they can play more per day. This is part of what rarity\nbuys: more plays per day (throughput). See [Stats, Rarity & Rank](stats-rarity.md).\n\n## Refills (coming)\n\nWhen HAY ships you will be able to buy an instant **Energy refill** with it. HAY is burned on use, so refills\nare a genuine sink, not free currency. See [Currencies](currencies.md).\n\n## Multiple bulls, more energy\n\nBecause energy is per bull, owning more bulls means more total energy across your stable, and more duels per\nday. This is the main way owning more bulls scales your play, always breadth, never raw power."}, "ranked-duels": {"title": "Ranked Duels & Seasons", "md": "# Ranked Duels & Seasons\n\n> **Status: mostly coming.** Duels, GRIT rewards, and your win/loss record are **live today**, and there is a\n> live **GRIT leaderboard** you climb by gathering GRIT. The full seasonal ladder described below, with\n> tiers, promotions, and season resets, is on the [Roadmap](roadmap.md).\n\nRanked Duels are the planned competitive spine of BullQuest: a seasonal ladder you climb on skill.\n\n## Seasons (coming)\n\n* A season runs about 6 to 8 weeks.\n* At the end there is a **soft rank reset**, so there is fresh urgency each season without wiping your\n  progress entirely.\n\n## Tiers (coming)\n\nYou will climb through named tiers, each with sub-divisions (illustrative):\n\n```\nCalf  ->  Bullock  ->  Raging  ->  Stampede  ->  Bull Market  ->  Legendary\n```\n\nYou gain or lose rank points per duel, with promotions and relegations between tiers.\n\n## Rewards\n\nToday, winning a duel pays GRIT and XP, and your GRIT total sets your place on the leaderboard. The planned\nladder adds two more honest reward sources:\n\n* **Duel entry-fee pools** (redistributive): GRIT and, later, HAY staked into duels paid back out to winners.\n* **Seasonal chests** at tier thresholds (arriving with the token phase).\n\nTop tiers will also earn **cosmetics and titles**, pure status rewards.\n\n## Fair by design\n\nYou will always be matched inside a **Bull Rating bracket** and your ladder tier, so opponents are close to\nyou in power. Today, challengers already mirror your bull's power to keep fights close. See\n[The Arena](arena.md) and [Fairness & Anti-Cheat](fairness.md)."}, "daily-quests": {"title": "Daily Quests", "md": "# Daily Quests\n\nDaily Quests are small goals that reset each day and reward you for playing the way the game is meant\nto be played.\n\n## How they work\n\n* You get a small set of quests each day, for example \"Win 3 duels\", \"Spin the wheel\", or\n  \"Enter the Arena\".\n* Complete a quest to earn a reward (GRIT and progress).\n* Clear all of the day's quests to earn a **bonus chest**.\n* Streak jars unlock at 3, 5, and 7 days of completions. Days do not need to be consecutive for the\n  jars, so missing a day is not the end of the world.\n\n## Why they exist\n\nQuests give structure to a session and make sure every kind of play pays off. They are one part of\nthe daily loop, alongside the [Daily Spin](daily-spin.md) and your login streak.\n\n> Quest rewards are GRIT and progress today. As the economy deepens, some quests will pay HAY or\n> feed seasonal goals. See the [Roadmap](roadmap.md).\n"}, "daily-spin": {"title": "Daily Spin", "md": "# Daily Spin\n\nThe Daily Spin is your free once-a-day pull on the prize wheel. It is the easiest GRIT you will earn\nand a good reason to check in every day.\n\n## How it works\n\n* Every account gets **one free spin per day**.\n* The wheel has 12 segments, all **GRIT** rewards, from small to a rare **100 GRIT jackpot**.\n* The result is decided on the server, then the wheel lands on it, so what you see is what you get.\n* The reward is credited to your GRIT balance immediately.\n* After you spin, the card shows \"Come back tomorrow\" until your next free spin unlocks.\n\n## Odds\n\nSmaller GRIT prizes are common; the 100 GRIT jackpot is deliberately rare. You are guaranteed to win\nGRIT on every spin, there are no empty slots.\n\n## Extra spins (coming)\n\nWhen HAY ships you will be able to buy **extra spins** with it beyond your free daily one. Because\nHAY is burned on use, extra spins are a real sink rather than free currency. Higher [Account\nRank](account-rank.md) will also raise your spin reward tier.\n"}, "training": {"title": "Training", "md": "# Training\n\n> **Status: Coming.** Training is designed and on the roadmap. This page describes how it will work.\n\nTraining is the idle-return hook of BullQuest. It replaces the \"walking\" of move-to-earn games with\nsomething a web-first game can deliver: start a session on a bull, come back later, and collect.\n\n## How it will work\n\n* Each bull can occupy a **Training Slot**.\n* You start a session and choose a length:\n\n| Session | Duration | Reward |\n|---|---|---|\n| Light | 2 hours | small GRIT + XP |\n| Standard | 4 hours | medium GRIT + XP |\n| Deep | 8 hours | large GRIT + XP (great overnight) |\n\n* When the session finishes, you collect your GRIT and XP, then start another.\n* Sessions bank while you are offline up to a cap, so returning the next day always has a payoff.\n\n## Multiple bulls\n\nOwning more bulls means more **Training Slots** running in parallel, so more GRIT per day. Slots\nbeyond a soft cap will cost HAY to keep active, which keeps the economy balanced.\n\n## Instant finish (coming)\n\nAn optional **instant finish** with HAY lets impatient players collect early. Like other HAY uses,\nit is a sink.\n"}, "sector-wars": {"title": "Sector Wars", "md": "# Sector Wars\n\n> **Status: Coming.** Sector Wars is designed as the social endgame and the flagship of the\n> economy. This page describes how it will work.\n\nSector Wars is a map of territories themed on **crypto market sectors**: DeFi, Memes, L1s, Gaming,\nAI, RWA, NFTs, Privacy, and more. Clans fight to control sectors over a weekly cycle. Controlling a\nsector pays pooled rewards and prestige, and it is contested constantly, so holding it is a fight.\n\n## The weekly cycle\n\n1. **Declare.** Clans stake into the sectors they want to attack or defend. The stake is their entry\n   into the sector's redistributive prize pool.\n2. **Contest.** During the window, clan members fight **Sector Duels**. Their combined results make\n   up the clan's Sector Score.\n3. **Resolve.** The clan with the highest Sector Score controls the sector for the next cycle.\n4. **Reward.** The staked pool (minus a rake that is partly burned as a sink) is paid out to the\n   winning clan. Controllers also earn a passive sector yield and exclusive cosmetics and titles.\n\n## Fair by design\n\n* **Caps:** a single clan can hold only so many sectors, and there are per-member and per-clan stake\n  caps.\n* **Diminishing yield** for over-concentration, so one whale clan cannot own the whole map.\n* **Redistributive:** rewards come from staked pools, never from printing new tokens. The rake is a\n  permanent sink.\n\n\"Control DeFi this season\" is the kind of flex the audience gets instantly, and it is the beating\nheart of the redistributive economy. See [Clans](clans.md) and [Currencies](currencies.md).\n"}, "clans": {"title": "Clans", "md": "# Clans\n\n> **Status: Coming** (ships with Sector Wars).\n\nClans are BullQuest's guilds. They are **native and automated from day one**, so there are no manual\nsign-up forms or waiting on an admin to add you. You join, you contribute, you share the rewards.\n\n## What clans have\n\n* **Roles** (leader, officers, members) and a clan **treasury**.\n* Clan **chat** and a member roster.\n* A shared goal each week: win **Sector Duels** to raise the clan's Sector Score in\n  [Sector Wars](sector-wars.md).\n\n## How you contribute\n\nMembers contribute by winning Sector Duels during the weekly cycle. Your wins feed the clan's score,\nand when the clan wins a sector, the staked pool is shared with the herd.\n\n## Joining and leaving\n\nAdding and removing members is handled in-game, quickly, without external forms. You can find a\nclan, apply or join, and start contributing the same session.\n"}, "account-rank": {"title": "Account Rank", "md": "# Account Rank\n\n> **Status: Coming.**\n\nAccount Rank is a separate, account-level rank (0 to 10) that reflects how active and invested you\nare. It is different from your [Ranked Duels](ranked-duels.md) ladder tier.\n\n## What it gates\n\nYour Account Rank raises:\n\n* Your **Daily Spin** reward tier.\n* Your daily **chest** size.\n* Marketplace **sell slots**.\n* Eligibility for **Sector captaincy**.\n\n## How it is calculated\n\nAccount Rank is based on a rolling window of:\n\n* Recent activity (duels and training over the last week or so).\n* Owned assets (bulls and other NFTs).\n* Season performance.\n* Quest completion.\n\n## It decays, but fairly\n\nIf you go inactive, your Account Rank slowly decays, which nudges you to return. Here is the\nimportant part: Account Rank is **not** tied to holding the token. Many games punished you for\nselling by decaying your rank when your token balance dropped. BullQuest rewards **engagement and\nownership**, never \"hold the speculative token or lose your rank.\"\n"}, "currencies": {"title": "Currencies: GRIT, HAY, $BULL", "md": "# Currencies: GRIT, HAY, $BULL\n\nBullQuest uses three currencies, deliberately separated so each does one job well. This separation is the\ncore fix for the economy problems that sank move-to-earn tokens.\n\n## The one principle\n\n> The tradeable token's demand must not come from expecting to earn more of the token.\n\nThe game currency you grind (GRIT) is soft and off-chain, so grinding it can never become token sell\npressure. The tradeable token ($BULL) is scarce, and it is designed so you mostly **win it from other\nplayers' entry fees**, not from an inflation faucet. That single choice is why the economy is built to last.\n\n## GRIT (soft currency)\n\n* **What:** an off-chain, in-game currency. Never tradable, never cashable, no monetary value.\n* **Earn it from:** duels, the daily spin, and daily quests (training soon).\n* **What it is for:** GRIT is what you gather today, and it is the basis for your future **$BULL airdrop**\n  (see below). **Spending** GRIT, on leveling, low-tier crafting, cosmetic customization, and re-rolls,\n  arrives as those systems ship; for now GRIT is a balance you grow by playing.\n\n**GRIT is live today.** You start with a small balance and grow it by playing.\n\n## HAY (premium consumable) - *coming*\n\n* **What:** a consumable \"gas\" bought with $BULL, SOL, or a card.\n* **Spend it on:** energy refills, arena and tournament entry fees, temporary boosts, extra spins, and\n  crafting attempts.\n* **Why:** HAY is **burned on use**, which creates a steady, low-friction sink. It is the main way real\n  spend flows through the game, and it keeps the token economy balanced.\n\n## $BULL (the token) - *coming, Solana mainnet*\n\n* **What:** a Solana SPL token, hard-capped supply. The only liquid financial asset in the game.\n* **Demand comes from (non-reflexive):** utility (minting, breeding, high-stakes entries, premium\n  cosmetics, gear), status (holding tiers, exclusive events, governance), and **buyback-burn from real\n  revenue**.\n* **How you would get it:** mainly by **winning redistributive prize pools** (other players' entry fees), or\n  by buying it. Direct emission from a rewards bucket is minimized, capped, and throttled.\n\nSee [$BULL Tokenomics](tokenomics.md) for supply and vesting.\n\n> The $BULL token and any airdrop are planned and forward-looking. They may change, be delayed, or never\n> launch, and nothing here is a promise of value or a financial return. See the [Roadmap](roadmap.md) and\n> the [Terms of Use](terms.md)."}, "tokenomics": {"title": "$BULL Tokenomics", "md": "# $BULL Tokenomics\n\n> **Status: Coming.** The token launches only after the game proves retention. Everything here is a\n> proposed starting point and the full schedule is **published at or before launch**.\n\n## Headline\n\n* **Token:** $BULL, an SPL token on **Solana mainnet**.\n* **Total supply:** **1,000,000,000 (1 billion), hard-capped.**\n* **Emission philosophy:** capped, throttled, and circuit-broken, never a per-user faucet.\n* **Disclosure:** the full vesting schedule is published at or before launch. Radical transparency\n  is the point.\n\n## Allocation\n\n| Bucket | % | Purpose | Vesting |\n|---|---|---|---|\n| **Play & Ecosystem Rewards** | 30% | Redistributive prize top-ups, capped seasonal emission, staking-for-access | 48-month capped release, circuit-broken |\n| **Community & Airdrops** | 8% | Player airdrops, Genesis-holder allocation, quests | Engagement-gated over 24 months |\n| **Treasury & LiveOps** | 17% | Ops, content, buyback-burn, partnerships, liquidity support | 6% at launch, then 36-month linear |\n| **Team & Advisors** | 15% | Founders and contributors | 12-month cliff, then 36-month linear |\n| **Investors** | 18% | Fundraise | 6 to 12-month cliff, then 24 to 36-month linear |\n| **Liquidity** | 12% | Deep launch liquidity | 100% at launch (locked) |\n\n## What this fixes\n\nThe token was designed by studying exactly how other move-to-earn tokens collapsed, and fixing each\ntrap:\n\n* **Deeper liquidity:** 12% at launch (three times deeper than the game we studied), so unlocks\n  cannot collapse the order book on their own.\n* **A tamer reward stream:** 30% over 48 months, capped and circuit-broken, so emission cannot\n  outrun the game's sinks, and it auto-throttles in a downturn.\n* **Smaller insider overhang** with **published long cliffs**, so there are no surprise unlocks.\n* **Real-revenue demand:** the treasury uses real revenue to **buy back and burn** $BULL, which is\n  demand that does not depend on anyone expecting to earn more token.\n\n## Launch unlock is small\n\nOnly about 15 to 17% of supply is circulating at launch (mostly the locked liquidity plus a small\ncommunity and treasury slice). Team and investors sit behind cliffs.\n\n> These numbers are a starting point and depend on the fundraise. The final, exact schedule is\n> published before the token exists.\n"}, "marketplace": {"title": "Marketplace", "md": "# Marketplace\n\n> **Status: Coming.**\n\nThe Marketplace is where you will buy, sell, and trade bulls and gear with other players.\n\n## Getting another bull\n\nToday every account gets one free Genesis bull. Later, you will be able to get more bulls by:\n\n* **Buying** one on the marketplace from another player.\n* **Breeding** two of your bulls (see [Breeding, Fusion & Gear](breeding-fusion-gear.md)).\n* **Fusing** several bulls into a rarer one.\n* **Events and drops.**\n\n## Trading\n\n* Listings will be priced in $BULL (and settle on Solana), with fees partly burned as a sink.\n* Your number of **sell slots** is gated by your [Account Rank](account-rank.md), which discourages\n  spam and market manipulation.\n* Re-equip cooldowns on gear prevent one set of items from serving an entire stable, which keeps\n  gear demand healthy.\n\n## Fairness\n\nThe marketplace is rate-limited and monitored for manipulation. Because there is no free-action to\ntoken faucet, there is nothing profitable to farm by botting; a bot just meets equally strong\nopponents in matchmaking.\n\nPrices, fees, and slot rules are set closer to launch. Until then, the marketplace is on the\n[Roadmap](roadmap.md).\n"}, "fairness": {"title": "Fairness & Anti-Cheat", "md": "# Fairness & Anti-Cheat\n\nBullQuest is built so that nobody can cheat the outcome of a duel or their stats.\n\n## Server-authoritative outcomes\n\nEvery duel is resolved **on the server**, inside a database function. Your browser sends your choices\n(discipline, stance, stake); it does not send the result. This means:\n\n* You cannot edit your stats from the browser. Power, Speed, Stamina, level, XP, and your record are all\n  server-side and locked, so there is no way to hack a stronger bull.\n* You cannot forge a win. The math runs where you cannot touch it.\n\n## Randomness you cannot rig\n\nThe bounded random factor in a duel is generated **on the server** from a seed you cannot predict or control\n(it mixes server-side randomness with the exact moment of the request). Because the roll happens where you\ncannot reach it, you cannot force a favorable result from your browser.\n\n> **Coming:** full public commit-reveal verification, where the server publishes a hashed seed before the\n> duel and reveals it after so anyone can recompute and check the result. Today randomness is\n> server-controlled and tamper-resistant; the public-verification layer is a planned upgrade.\n\n## Close, fair fights\n\nToday every challenger is generated to **mirror your bull's power**, so fights are close and decided by your\ndiscipline, your stance gamble, your bull's rarity and level, and bounded luck, not by a lopsided matchup.\nFull skill-based matchmaking against other live players, with a Bull Rating system, is on the\n[Roadmap](roadmap.md).\n\n## No pay-to-win, little to bot\n\n* Your first bull is free and random, and you can never buy or edit raw stats, so there is no way to\n  purchase a win.\n* GRIT is a soft, off-chain currency with no cash value, and outcomes are server-side, so there is little to\n  gain from botting today. As the marketplace and token arrive, rate limits and anti-abuse measures scale up\n  with them.\n\n## Your account safety\n\nBullQuest never asks for your seed phrase or private key. Signing in with a wallet is a message signature,\nnot a transaction: it costs nothing and moves no funds. If anything ever asks for your seed phrase, it is\nnot us."}, "roadmap": {"title": "Roadmap", "md": "# Roadmap\n\nBullQuest ships in phases, on purpose. The game comes first, ownership and the token come later,\nonce the game has proven people want to play it. That order is a deliberate choice, not an accident.\n\n## Phase 1: Play the game (live)\n\n* Create an account (email or Solana wallet) and claim your free Genesis bull.\n* Real Arena duels: disciplines, stances, crit, bounded RNG, server-authoritative.\n* Energy and a real GRIT balance.\n* Daily Spin for real GRIT.\n* Your bull shown across the app with its real art, stats, rarity, and record.\n\n## Phase 2: Depth and retention (next)\n\n* Training sessions (the idle-return loop).\n* Real Daily Quests, streaks, and the seasonal ladder with tiers.\n* More of the home dashboard driven by your real progress.\n* CAPTCHA and account hardening ahead of a public launch.\n\n## Phase 3: Sector Wars and clans

* Clans go live.
* Sector Wars: weekly territory battles over crypto-market sectors, with redistributive prize pools.

## Phase 4: The $BULL token

* Launch $BULL on Solana mainnet, with the full vesting schedule published up front.
* HAY becomes the premium sink; milestone gates and high-stakes entries switch on the token sink.
* Staking and governance.

## Phase 5: On-chain ownership

* **Mint your bull** as a real asset on Solana mainnet.
* The Marketplace opens: buy, sell, and trade bulls and gear.
* Breeding and Fusion.

> Everything above on-chain is future-tense on purpose. Today your bull lives in your account and\n> the game is free to play. We will not present a feature as done until it is.\n"}, "faq": {"title": "FAQ", "md": "# FAQ\n\n### Is BullQuest free?\n\nYes. You create an account and get a free Genesis bull, and the whole game loop (duels, spin, quests) is free\nto play. You never have to spend to compete.\n\n### Do I need a crypto wallet?\n\nNo. You can sign up with just an email. Connecting a Solana wallet (Phantom, Solflare, Backpack) is an\noptional, smoother way to sign in, and it will be needed later for on-chain features. See\n[Wallets & Sign-in](wallets.md).\n\n### Do I need SOL to play?\n\nNo. Signing in with a wallet is a free message signature, not a transaction. You would only need SOL or $BULL\nonce on-chain features (minting, the marketplace, high-stakes entries) ship.\n\n### Is my bull an NFT on-chain?\n\nNot yet. Today your bull is tied to your BullQuest account. Minting it as a real Solana asset is a planned\nphase; when it ships you will be able to mint the bull you already own. See the [Roadmap](roadmap.md).\n\n### Can I earn real money right now?\n\nNo, and that is by design. Today you earn GRIT, a soft in-game currency that is not tradable or cashable. The\ntradeable $BULL token is planned for after the game proves retention, and even then it is designed so you\nearn by winning other players' entry fees, not from an inflation faucet.\n\n### Does rarity or spending let me win more?\n\nRarity gives a **small, bounded edge** to your win chance, and higher-rarity bulls have bigger energy pools,\nso they can play more. But your first bull is free and random, you can never buy or edit raw stats, and the\nArena shows your exact win chance before every duel. So higher rarity helps a little; it is never an auto-win\nand nobody buys their way to a better win rate. See [Stats, Rarity & Rank](stats-rarity.md).\n\n### Why did my duel lose when I guessed the stance right?\n\nWinning the stance gamble tips the fight in your favor; it does not guarantee a win. Your stats, the\nchallenger's stats, the crit rolls, rarity and level, and bounded luck all factor in. That variance is what\nkeeps the Arena tense. See [The Arena](arena.md).\n\n### How does energy work?\n\nEach duel costs 2 energy, and energy refills about 1 point every 15 minutes. Higher-rarity bulls have bigger\nenergy pools (10 for Common up to 16 for Legendary). See [Energy](energy.md).\n\n### My bull shows a placeholder image, not real art. Why?\n\nThe 5,000-bull art set is being uploaded in batches. If your bull shows a placeholder, its image is still on\nits way and will appear shortly.\n\n### How do I get support?\n\nUse the in-app **Feedback** button or the **Bull Assistant** chat any time. Full support channels open\nalongside the public launch.\n\n> Brand, numbers, and exact rules in these docs are provisional and tuned during testing."}, "terms": {"title": "Terms of Use", "md": "# Terms of Use\n\n_Last updated: July 2026. BullQuest is in active development (beta); these terms are a starting point and will be updated before public launch._\n\nWelcome to BullQuest (\"BullQuest\", \"we\", \"us\"). By creating an account or playing, you agree to these Terms of Use. If you do not agree, please do not use BullQuest.\n\n## 1. Who can play\n\nYou must be at least 13 years old (or the minimum digital-consent age where you live) and able to form a binding agreement. Do not use BullQuest where it is prohibited by law.\n\n## 2. Your account\n\n- You are responsible for keeping your login (email and password, or your Solana wallet) secure.\n- One account per person. Do not create multiple accounts to farm rewards.\n- We never ask for your wallet seed phrase or private keys, and we never take custody of your funds. Signing in with a wallet is a message signature, not a transaction.\n\n## 3. The game and GRIT\n\nBullQuest is a free-to-play game. **GRIT is a soft, in-game currency with no monetary value.** It is not money, is not redeemable for cash, and cannot be sold, traded, or transferred off the platform. Your bull, stats, GRIT, and other in-game items are a limited license to use inside the game, not property or a financial instrument, and we may adjust them as part of running and balancing the game.\n\n## 4. Forward-looking features and the $BULL token\n\nParts of BullQuest describe planned features, including the **$BULL token and any airdrop**. These are **forward-looking and are not a promise or guarantee.** They may change, be delayed, or never launch. Nothing in BullQuest is an offer or solicitation to buy any token or security, is financial or investment advice, or is a guarantee of any future value, reward, or airdrop. Do not play expecting financial gain. Any future token or airdrop, if it happens, will have its own separate terms.\n\n## 5. Fair play\n\nDo not cheat, exploit bugs, use bots or automation, reverse-engineer, tamper with game data, or otherwise gain an unfair advantage. We may suspend or terminate accounts that break these rules or abuse the service, and we may remove rewards obtained unfairly.\n\n## 6. Availability\n\nBullQuest is provided \"as is\" and \"as available\", without warranties of any kind. We may change, suspend, or discontinue any part of the game at any time, and we do not guarantee uninterrupted or error-free operation.\n\n## 7. Limitation of liability\n\nTo the maximum extent permitted by law, BullQuest and its team are not liable for any indirect, incidental, or consequential damages, or for any loss of data, in-game items, GRIT, or anticipated rewards, arising from your use of the game.\n\n## 8. Changes\n\nWe may update these terms as the game evolves. Material changes will be shown here with a new date. Continuing to play after an update means you accept the updated terms.\n\n## 9. Contact\n\nQuestions? Reach us through the in-app **Feedback** button or the official BullQuest channels.\n"}, "privacy": {"title": "Privacy Policy", "md": "# Privacy Policy\n\n_Last updated: July 2026. BullQuest is in active development; this policy will be updated before public launch._\n\nThis policy explains what BullQuest collects and how we use it. We collect only what we need to run the game.\n\n## What we collect\n\n- **Account:** if you sign up with email, your email address and a password (stored hashed, never in plain text). If you sign in with a Solana wallet, your **public wallet address** (never your seed phrase or private keys).\n- **Gameplay:** your bull, its stats and record, your GRIT balance, and your duels, quests, and spins.\n- **Feedback:** anything you send through the in-app Feedback tool, including an optional screenshot you choose to attach.\n- **Technical:** basic technical data (such as IP address and device or browser info) processed by our infrastructure providers to deliver and secure the service.\n\n## How we use it\n\nTo create and run your account, provide the game, save your progress, prevent cheating and abuse, respond to feedback and support, and improve BullQuest. We do **not** sell your personal data.\n\n## Who processes it\n\nBullQuest runs on third-party infrastructure that processes data on our behalf, including **Supabase** (database, authentication, and file storage), **Cloudflare** (bot and abuse protection), and **GitHub Pages** (web hosting). Each has its own security and privacy practices.\n\n## Local storage\n\nWe store small amounts of data in your browser, such as your login session and preferences like your login streak and whether you have seen the intro guide. You can clear this from your browser at any time.\n\n## Wallet and blockchain\n\nA Solana wallet address is public on the blockchain by nature. We use it only to identify your account. We never receive or store your seed phrase or private keys, and signing in never moves funds.\n\n## Keeping and deleting data\n\nWe keep your data while your account is active. You can request access to or deletion of your data through the in-app Feedback button or the official BullQuest channels. Deleting your account releases your bull back into the collection.\n\n## Children\n\nBullQuest is not directed at children under 13 (or the minimum age where you live). We do not knowingly collect their data.\n\n## Changes\n\nWe may update this policy as the game evolves; material changes will be shown here with a new date.\n\n## Contact\n\nReach us through the in-app **Feedback** button or the official BullQuest channels.\n"}}, "first": "README"};
var flat = [];
DOC.nav.forEach(function(g){ g.items.forEach(function(i){ flat.push(i); }); });

function buildNav(filter){
  var list = document.getElementById('navlist'), html = '';
  DOC.nav.forEach(function(g){
    var items = g.items.filter(function(i){ return !filter || i.title.toLowerCase().indexOf(filter.toLowerCase())>=0; });
    if(!items.length) return;
    html += '<div class="grp">'+g.group+'</div>';
    items.forEach(function(i){ html += '<a href="#'+i.slug+'" data-slug="'+i.slug+'">'+i.title+'</a>'; });
  });
  list.innerHTML = html;
  markActive();
}
function buildSide(){
  // Build the search input ONCE (rebuilding it on every keystroke used to drop characters), then only
  // refresh the nav list as the user types.
  var s = document.getElementById('side');
  s.innerHTML = '<input class="search" id="q" placeholder="Search docs..." autocomplete="off"><div id="navlist"></div>';
  document.getElementById('q').addEventListener('input', function(){ buildNav(this.value); });

}
function markActive(){
  var slug = (location.hash||'#'+DOC.first).slice(1);
  [].forEach.call(document.querySelectorAll('.side a'), function(a){ a.classList.toggle('on', a.getAttribute('data-slug')===slug); });
}
function render(){
  var slug = (location.hash||'#'+DOC.first).slice(1);
  var pg = DOC.pages[slug] || DOC.pages[DOC.first];
  var c = document.getElementById('content');

  document.title = pg.title + ' - BullQuest Docs';
  // pager
  var idx = flat.findIndex(function(i){ return i.slug===slug; });
  var pv = idx>0?flat[idx-1]:null, nx = idx>=0&&idx<flat.length-1?flat[idx+1]:null, ph='';
  if(pv) ph += '<a href="#'+pv.slug+'"><small>Previous</small>'+pv.title+'</a>'; else ph+='<span></span>';
  if(nx) ph += '<a class="next" href="#'+nx.slug+'"><small>Next</small>'+nx.title+'</a>';
  document.getElementById('pager').innerHTML = ph;
  markActive();
  document.body.classList.remove('nav-open');
  window.scrollTo(0,0);
}
