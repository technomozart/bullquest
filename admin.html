<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>BullQuest · Analytics</title>
<style>
  :root{
    --violet:#6B31E6; --violet2:#7C5CE6; --bg:#F4F2FB; --card:#fff;
    --ink:#20143A; --body:#5B5570; --faint:#9AA0AE; --hair:#ECEAF3;
    --green:#2FA657; --amber:#E0930F; --blue:#4DA6F5;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);
    -webkit-font-smoothing:antialiased;padding:calc(20px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom))}
  .wrap{max-width:820px;margin:0 auto}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:-.3px}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(180deg,var(--violet2),var(--violet));display:grid;place-items:center;color:#fff;font-size:15px}
  .brand small{font-weight:700;font-size:12px;color:var(--faint);letter-spacing:.3px;text-transform:uppercase;margin-left:2px}
  .spacer{flex:1}
  button.refresh{border:0;background:var(--violet);color:#fff;font-family:inherit;font-weight:800;font-size:13.5px;
    padding:10px 16px;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;min-height:42px}
  button.refresh:active{transform:translateY(1px)}
  button.refresh[disabled]{opacity:.55;cursor:default}
  .stamp{font-size:12px;color:var(--faint);font-weight:600;width:100%}

  .msg{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:26px 22px;text-align:center;color:var(--body);font-size:15px;line-height:1.55}
  .msg h2{margin:0 0 8px;color:var(--ink);font-size:18px}
  .msg a{color:var(--violet);font-weight:800;text-decoration:none}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
  .kpi{background:var(--card);border:1px solid var(--hair);border-radius:15px;padding:15px 16px}
  .kpi .lab{font-size:11.5px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:5px;font-variant-numeric:tabular-nums}
  .kpi .sub{font-size:12px;color:var(--body);font-weight:600;margin-top:2px}

  .panel{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:18px 18px 20px;margin-bottom:14px}
  .panel h3{margin:0 0 4px;font-size:15px;font-weight:800}
  .panel .hint{margin:0 0 16px;font-size:12.5px;color:var(--faint);font-weight:600}

  .funnel{display:flex;flex-direction:column;gap:11px}
  .fstage{}
  .fstage .frow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .fstage .fname{font-size:13.5px;font-weight:700;color:var(--ink)}
  .fstage .fnum{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums}
  .fstage .fnum span{color:var(--faint);font-weight:700;margin-left:6px}
  .track{height:12px;background:#F1EEF9;border-radius:7px;overflow:hidden}
  .track i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--violet2),var(--violet));transition:width .5s cubic-bezier(.22,.61,.36,1)}

  .rets{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ret{background:#FAF8FF;border:1px solid var(--hair);border-radius:13px;padding:14px 15px;text-align:center}
  .ret .rlab{font-size:11.5px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
  .ret .rpct{font-size:28px;font-weight:800;letter-spacing:-1px;margin-top:4px;font-variant-numeric:tabular-nums}
  .ret .rsub{font-size:12px;color:var(--body);font-weight:600;margin-top:1px}
  .ret.dim .rpct{color:var(--faint)}

  .chart{margin-top:4px}
  .legend{display:flex;gap:16px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--body)}
  .legend b{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  svg{width:100%;height:auto;display:block;overflow:visible}
  .err{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--hair);align-items:flex-start}
  .err:first-of-type{border-top:0}
  .err .emsg{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:var(--ink);word-break:break-word;line-height:1.45}
  .err .epage{color:var(--faint);font-weight:600;margin-top:3px;font-family:var(--font);font-size:11.5px}
  .err .emeta{font-size:11px;color:var(--faint);font-weight:700;white-space:nowrap;text-align:right}
  .err .ecount{display:inline-block;background:#FDECEC;color:#C23B3B;font-weight:800;border-radius:8px;padding:1px 7px;margin-bottom:4px}
  .ok-row{color:var(--green);font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
  .foot{font-size:11.5px;color:var(--faint);font-weight:600;text-align:center;margin-top:20px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><img src="assets/icons/logo.png" alt="BullQuest" style="width:28px;height:28px;object-fit:contain;display:block;flex:none"> BullQuest <small>Analytics</small></div>
    <div class="spacer"></div>
    <button class="refresh" id="refresh">↻ Refresh</button>
    <div class="stamp" id="stamp"></div>
  </div>
  <div id="root"><div class="msg">Loading…</div></div>
  <div class="foot">
    Privacy-first: no third-party trackers, no cookies, no PII. Just counts of who signed up and who came back.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var URL_='https://cewumdioknvjtsiolxce.supabase.co';
  var KEY_='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNld3VtZGlva252anRzaW9seGNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTI3NzUsImV4cCI6MjA5OTI2ODc3NX0.n_r2gixZZTuTyJOiUhCZMpPKp5mUYtdM9bShs-nWkWk';
  var root=document.getElementById('root'), stamp=document.getElementById('stamp'), btn=document.getElementById('refresh');
  var sb=null;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function pct(a,b){ return b>0?Math.round(a/b*100):0; }
  function msg(html){ root.innerHTML='<div class="msg">'+html+'</div>'; }

  function kpi(lab,val,sub){ return '<div class="kpi"><div class="lab">'+esc(lab)+'</div><div class="val">'+esc(val)+'</div>'+(sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div>'; }

  function stage(name,n,base,showPct){
    var p=pct(n,base);
    return '<div class="fstage"><div class="frow"><span class="fname">'+esc(name)+'</span>'+
      '<span class="fnum">'+n+(showPct?'<span>'+p+'% of signups</span>':'')+'</span></div>'+
      '<div class="track"><i style="width:'+Math.max(2,p)+'%"></i></div></div>';
  }

  function retCard(lab,ret,elig,windowTxt){
    if(elig<=0) return '<div class="ret dim"><div class="rlab">'+lab+'</div><div class="rpct">-</div><div class="rsub">collecting data</div></div>';
    return '<div class="ret"><div class="rlab">'+lab+'</div><div class="rpct">'+pct(ret,elig)+'%</div><div class="rsub">'+ret+' of '+elig+' '+windowTxt+'</div></div>';
  }

  function chart(series){
    series=series||[];
    if(!series.length) return '';
    var W=760, H=170, padB=22, padT=8, n=series.length, gw=W/n;
    var max=1; series.forEach(function(d){ max=Math.max(max,d.signups||0,d.active||0); });
    var bars='';
    series.forEach(function(d,i){
      var x=i*gw, bw=Math.min(13,(gw-8)/2), gap=3, cx=x+gw/2;
      var hS=(d.signups||0)/max*(H-padB-padT), hA=(d.active||0)/max*(H-padB-padT);
      var y0=H-padB;
      // active bar (left), signups bar (right)
      bars+='<rect x="'+(cx-bw-gap/2)+'" y="'+(y0-hA)+'" width="'+bw+'" height="'+hA+'" rx="3" fill="#4DA6F5"></rect>';
      bars+='<rect x="'+(cx+gap/2)+'" y="'+(y0-hS)+'" width="'+bw+'" height="'+hS+'" rx="3" fill="#7C5CE6"></rect>';
      var lbl=String(d.day).slice(5); // MM-DD
      if(i%2===0||i===n-1) bars+='<text x="'+cx+'" y="'+(H-6)+'" text-anchor="middle" font-size="9.5" fill="#9AA0AE" font-weight="700">'+esc(lbl)+'</text>';
    });
    return '<div class="legend"><span><b style="background:#7C5CE6"></b>Signups</span><span><b style="background:#4DA6F5"></b>Active users</span></div>'+
      '<svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Daily signups and active users, last 14 days">'+bars+'</svg>';
  }

  function fmtTime(t){ try{ return new Date(t).toLocaleString(); }catch(e){ return ''; } }
  function errPanel(errs){
    errs=errs||[];
    var head='<div class="panel"><h3>Recent errors</h3><p class="hint">Uncaught JS errors from real sessions, last 7 days. Grouped by signature.</p>';
    if(!errs.length) return head+'<div class="ok-row">✓ No errors reported. All clear.</div></div>';
    var rows=errs.map(function(e){
      return '<div class="err"><div class="emsg">'+esc(e.message)+'<div class="epage">'+esc(e.page||'')+'</div></div>'+
        '<div class="emeta"><span class="ecount">×'+(e.count||1)+'</span><br>'+esc(fmtTime(e.last_seen))+'</div></div>';
    }).join('');
    return head+rows+'</div>';
  }

  function notifyPanel(){
    var inp='padding:9px 11px;border:1px solid rgba(120,120,140,.35);border-radius:9px;font:inherit;font-size:14px;background:#fff;color:#20143A;width:100%;box-sizing:border-box';
    return '<div class="panel"><h3>Send a notification</h3><p class="hint">Broadcast news to everyone, or message one player. It shows in their in-app notification bell.</p>'
      +'<div style="display:flex;flex-direction:column;gap:9px">'
      +'<input id="nfTitle" maxlength="140" placeholder="Title, e.g. New season is live" style="'+inp+'">'
      +'<textarea id="nfBody" maxlength="2000" rows="3" placeholder="Your message to players..." style="'+inp+';resize:vertical"></textarea>'
      +'<div style="display:flex;gap:9px;flex-wrap:wrap">'
      +'<select id="nfKind" style="'+inp+';width:auto"><option value="news">News</option><option value="update">Update</option><option value="personal">Personal</option></select>'
      +'<input id="nfTo" placeholder="To: leave blank for everyone, or a player email / id" style="'+inp+';flex:1;min-width:200px;width:auto">'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:12px"><button id="nfSend" class="refresh" style="cursor:pointer">Send</button><span id="nfMsg" style="font-size:13px;font-weight:600"></span></div>'
      +'</div></div>';
  }
  function wireNotify(){
    var b=document.getElementById('nfSend'); if(!b) return;
    b.addEventListener('click', function(){
      var t=(document.getElementById('nfTitle').value||''), body=(document.getElementById('nfBody').value||''),
          k=document.getElementById('nfKind').value, to=(document.getElementById('nfTo').value||'');
      var m=document.getElementById('nfMsg');
      if(!t.trim()||!body.trim()){ m.style.color='#E5484D'; m.textContent='Title and message are required.'; return; }
      b.setAttribute('disabled',''); m.style.color='#78808F'; m.textContent='Sending...';
      sb.rpc('admin_send_notice',{p_title:t,p_body:body,p_kind:k,p_to:to.trim()||null}).then(function(r){
        b.removeAttribute('disabled'); var d=r&&r.data;
        if(r.error||(d&&d.error)){ m.style.color='#E5484D'; m.textContent=(r.error&&r.error.message)||(d&&d.error)||'Failed to send.'; return; }
        m.style.color='#12B76A'; m.textContent='Sent to '+((d&&d.audience)||'everyone')+'.';
        document.getElementById('nfTitle').value=''; document.getElementById('nfBody').value=''; document.getElementById('nfTo').value='';
      }, function(){ b.removeAttribute('disabled'); m.style.color='#E5484D'; m.textContent='Failed to send.'; });
    });
  }
  function acctInp(){ return 'padding:9px 11px;border:1px solid rgba(120,120,140,.35);border-radius:9px;font:inherit;font-size:14px;background:#fff;color:#20143A;min-width:190px'; }
  function loadAccounts(){
    var el=document.getElementById('acctPanel'); if(!el) return;
    el.innerHTML='<div class="panel"><h3>Players &amp; accounts</h3><p class="hint">Loading…</p></div>';
    sb.rpc('admin_accounts').then(function(r){
      if(r.error){ el.innerHTML='<div class="panel"><h3>Players &amp; accounts</h3><p class="hint" style="color:#E5484D">'+esc(r.error.message||'error')+'</p></div>'; return; }
      var rows=r.data||[];
      var trs=rows.map(function(a){
        return '<tr style="border-top:1px solid rgba(120,120,140,.15)"><td style="font-family:monospace;font-size:11px;padding:6px 8px">'+esc(String(a.id).slice(0,8))+'</td>'
          +'<td style="padding:6px 8px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(a.email)+'">'+esc(a.email)+'</td>'
          +'<td style="padding:6px 8px">'+esc(a.signup)+'</td><td style="padding:6px 8px">'+(a.grit||0)+'</td><td style="padding:6px 8px">'+(a.bulls||0)+'</td>'
          +'<td style="padding:6px 8px">'+esc(a.wallet||'-')+'</td><td style="padding:6px 8px">'+esc(a.telegram||'-')+'</td><td style="padding:6px 8px">'+esc(a.last_active||'-')+'</td></tr>';
      }).join('');
      el.innerHTML='<div class="panel"><h3>Players &amp; accounts ('+rows.length+')</h3>'
        +'<p class="hint">Every account with its login methods + assets. If two rows are the same person, merge them below.</p>'
        +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr style="text-align:left;color:#9AA0AE;font-size:11px"><th style="padding:4px 8px">ID</th><th style="padding:4px 8px">Email</th><th style="padding:4px 8px">Via</th><th style="padding:4px 8px">GRIT</th><th style="padding:4px 8px">Bulls</th><th style="padding:4px 8px">Wallet</th><th style="padding:4px 8px">TG</th><th style="padding:4px 8px">Last seen</th></tr></thead><tbody>'+trs+'</tbody></table></div>'
        +'<div style="margin-top:14px;border-top:1px solid rgba(120,120,140,.2);padding-top:12px"><h3 style="margin:0 0 6px">Merge duplicates</h3>'
        +'<p class="hint">Fold a duplicate into the account you keep. The duplicate is deleted; its bulls, GRIT and logins move to the keeper, and extra free bulls return to the pool.</p>'
        +'<div style="display:flex;gap:9px;flex-wrap:wrap;align-items:center">'
        +'<input id="mgKeep" placeholder="Keep this one (email or id)" style="'+acctInp()+'">'
        +'<input id="mgDrop" placeholder="Delete/merge in (email or id)" style="'+acctInp()+'">'
        +'<button id="mgBtn" class="refresh" style="cursor:pointer">Merge</button><span id="mgMsg" style="font-size:13px;font-weight:600"></span></div></div></div>';
      wireMerge();
    }, function(){ el.innerHTML='<div class="panel"><h3>Players &amp; accounts</h3><p class="hint" style="color:#E5484D">Failed to load.</p></div>'; });
  }
  function wireMerge(){
    var b=document.getElementById('mgBtn'); if(!b) return;
    b.addEventListener('click', function(){
      var keep=(document.getElementById('mgKeep').value||'').trim(), drop=(document.getElementById('mgDrop').value||'').trim(), m=document.getElementById('mgMsg');
      if(!keep||!drop){ m.style.color='#E5484D'; m.textContent='Enter both accounts.'; return; }
      if(!confirm('Merge "'+drop+'" INTO "'+keep+'"?\n\nThe first account is permanently DELETED; its bulls, GRIT and logins move to the keeper. This cannot be undone.')) return;
      b.setAttribute('disabled',''); m.style.color='#78808F'; m.textContent='Merging…';
      sb.rpc('admin_merge',{p_keep:keep,p_drop:drop}).then(function(r){
        b.removeAttribute('disabled'); var d=r&&r.data;
        if(r.error||(d&&d.error)){ m.style.color='#E5484D'; m.textContent=(r.error&&r.error.message)||(d&&d.error)||'Merge failed.'; return; }
        m.style.color='#12B76A'; m.textContent='Merged. Keeper now has '+((d&&d.keep_bulls)!=null?d.keep_bulls:'?')+' bulls; '+((d&&d.free_bulls_returned)||0)+' free bull(s) returned to the pool.';
        document.getElementById('mgKeep').value=''; document.getElementById('mgDrop').value='';
        setTimeout(loadAccounts, 700);
      }, function(){ b.removeAttribute('disabled'); m.style.color='#E5484D'; m.textContent='Merge failed.'; });
    });
  }
  function render(d){
    var html='';
    html+=notifyPanel();   // admin: send news / personal notifications to players
    // KPIs
    html+='<div class="grid">'+
      kpi('Total users', d.users_total)+
      kpi('Active today', d.dau_today, 'unique opens')+
      kpi('Avg daily (7d)', d.dau_7d_avg)+
      kpi('Signups today', d.signups_today)+
      kpi('Signups (7d)', d.signups_7d)+
    '</div>';

    // Errors (prominent - if something's broken you see it right away)
    html+=errPanel(d.recent_errors);

    // Funnel
    var su=d.funnel_signed_up||0;
    html+='<div class="panel"><h3>Activation funnel</h3><p class="hint">How far each signup gets. Lifetime, all users.</p><div class="funnel">'+
      stage('Signed up', su, su, false)+
      stage('Played a duel', d.funnel_dueled||0, su, true)+
      stage('Came back another day', d.funnel_returned||0, su, true)+
    '</div></div>';

    // Retention
    html+='<div class="panel"><h3>Retention</h3><p class="hint">Of users who signed up after tracking began ('+esc(d.measuring_since)+'), how many returned.</p><div class="rets">'+
      retCard('D1 return', d.d1_retained||0, d.d1_eligible||0, 'came back next day')+
      retCard('D7 return', d.d7_retained||0, d.d7_eligible||0, 'back within 7 days')+
    '</div></div>';

    // Chart
    html+='<div class="panel"><h3>Last 14 days</h3><p class="hint">Daily signups vs unique active users.</p><div class="chart">'+chart(d.series)+'</div></div>';

    html+='<div id="acctPanel"></div>';
    root.innerHTML=html;
    wireNotify();
    loadAccounts();
    var g=d.generated_at?new Date(d.generated_at):null;
    stamp.textContent = g ? ('Updated '+g.toLocaleString()) : '';
  }

  function load(){
    btn.setAttribute('disabled','');
    sb.auth.getSession().then(function(s){
      if(!s.data.session){
        msg('<h2>Not signed in</h2>Open the <a href="./">BullQuest app</a> and sign in first, then come back here.');
        btn.removeAttribute('disabled'); return;
      }
      // The stored access token may have expired since the last visit; refresh it before the admin RPC
      // so a stale token never surfaces as "JWT expired".
      return sb.auth.refreshSession().then(function(rs){
        if((rs&&rs.error) || !(rs&&rs.data&&rs.data.session)){
          msg('<h2>Session expired</h2>Open the <a href="./">BullQuest app</a>, make sure you are still signed in, then come back and hit Refresh.');
          btn.removeAttribute('disabled'); return;
        }
        return sb.rpc('admin_analytics').then(function(r){
          btn.removeAttribute('disabled');
          if(r.error){ msg('<h2>Something went wrong</h2>'+esc(r.error.message||'RPC error')); return; }
          var d=r.data;
          if(!d || d.error){ msg('<h2>Not authorized</h2>This account isn\'t an admin. Sign in with the founder account.'); return; }
          render(d);
        });
      });
    }).catch(function(e){ btn.removeAttribute('disabled'); msg('<h2>Error</h2>'+esc((e&&e.message)||e)); });
  }

  function ready(){
    if(!(window.supabase&&window.supabase.createClient)) return setTimeout(ready,60);
    sb=window.supabase.createClient(URL_,KEY_);
    btn.addEventListener('click',load);
    load();
  }
  ready();
})();
</script>
</body>
</html>
